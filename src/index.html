<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- LOGIN -->
<div id="page-login" class="hidden">
  <div class="auth-box">
    <div class="auth-wordmark">Telier</div>
    <div class="auth-title">Entrar</div>
    <div class="auth-sub">Bem-vindo de volta</div>
    <div class="form-row"><label>Usuário</label><input type="text" id="l-login" placeholder="seu_usuario" autocomplete="username"></div>
    <div class="form-row" style="position:relative"><label>Senha</label><input type="password" id="l-senha" placeholder="••••••••" autocomplete="current-password" style="padding-right:38px"><button type="button" class="eye-toggle" id="l-eye" data-eye-size="16" data-eye-stroke="1.6" onclick="toggleSenhaLogin(this)" title="Mostrar senha" aria-label="Mostrar senha"><svg id="l-eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg></button></div>
    <button class="btn btn-primary" id="btn-login" onclick="fazerLogin()">Entrar</button>
    <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px" onclick="modalCadastroPublico()">Criar minha conta</button>
    <button class="btn btn-ghost" id="btn-admin-setup" style="width:100%;justify-content:center;margin-top:8px;display:none" onclick="mostrar('setup')">Criar administrador inicial</button>
    <div id="login-err" class="auth-err hidden"></div>
  </div>
</div>

<!-- SETUP INICIAL -->
<div id="page-setup" class="hidden">
  <div class="auth-box">
    <div class="auth-wordmark">Primeiro acesso</div>
    <div class="auth-title">Criar administrador</div>
    <div class="auth-sub">Crie a conta principal do sistema. Isso só acontece uma vez.</div>
    <div class="form-row"><label>Nome completo</label><input id="s-nome" placeholder="Seu nome completo"></div>
    <div class="form-row"><label>Usuário</label><input type="text" id="s-login" placeholder="admin" autocomplete="username"></div>
    <div class="form-row" style="position:relative"><label>Senha</label><input type="password" id="s-senha" placeholder="Escolha uma senha forte" style="padding-right:38px"><button type="button" class="eye-toggle" data-eye-size="16" data-eye-stroke="1.6" onclick="toggleSenhaSetup(this)" title="Mostrar senha" aria-label="Mostrar senha"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg></button></div>
    <button class="btn btn-primary" id="btn-setup" onclick="fazerSetup()">Criar conta</button>
    <div id="setup-err" class="auth-err hidden"></div>
  </div>
</div>

<!-- APP -->
<div id="page-app" class="hidden">
  <nav class="topbar">
    <div class="topbar-logo" onclick="goHome()" title="Ir para início">Telier</div>
    <div id="topbar-breadcrumb" class="topbar-breadcrumb"></div>
    <div class="topbar-sep"></div>
    <div class="topbar-actions">
      <div id="topbar-presence" style="display:none"></div>
      <span class="topbar-user-name" id="topbar-nome"></span>
      <button class="btn btn-ghost btn-sm" id="btn-admin-toggle" style="display:none" onclick="alternarPerfilAdmin()">Visão admin</button>
      <button class="topbar-bell" id="btn-notifs" onclick="abrirNotificacoes()" title="Notificações" style="display:none">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 3.5a5 5 0 0 0-5 5v2.2c0 .7-.23 1.39-.66 1.94L5 14.5h14l-1.34-1.86a3.3 3.3 0 0 1-.66-1.94V8.5a5 5 0 0 0-5-5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M9.5 17a2.5 2.5 0 0 0 5 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span class="topbar-bell-dot hidden" id="notif-badge">0</span>
      </button>
      <button class="topbar-theme" id="btn-tema" onclick="alternarTema()" title="Alternar tema">
        <svg id="icon-tema-svg" width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12.5 9.5A5.5 5.5 0 0 1 5.5 2.5a5.5 5.5 0 1 0 7 7z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="btn btn-ghost btn-sm" onclick="fazerLogout()">Sair</button>
    </div>
  </nav>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div> Carregando...</div>
  </div>
</div>

<!-- TOAST & MODAIS -->
<div id="presence-dock"></div>
<div id="timer-dock"></div>
<div id="toast" class="hidden"></div>
<div id="modais"></div>
<div id="notif-overlay" class="notif-overlay" onclick="fecharPainelNotificacoes()"></div>
<aside id="notif-panel" class="notif-panel" aria-hidden="true"></aside>

<script type="module" src="app.js"></script>
</body>
</html>
