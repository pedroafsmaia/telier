          <div class="rel-kpi-value">${val}</div>
        </div>`).join('')}
    </div>
    ${arquivados > 0 ? `
      <div class="alert-banner" style="margin-bottom:12px">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="3" y="10" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M7 10V7a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        ${arquivados} projeto${arquivados !== 1 ? 's' : ''} arquivado${arquivados !== 1 ? 's' : ''} — exibidos em modo somente leitura.
      </div>` : ''}
    </div>
    <div class="rel-stack">
      ${projetos.map(p => {
        const status  = normalizarStatusProjeto(p.status);
        const isArqP  = status === 'Arquivado';
        const t  = Number(p.total_tarefas      || 0);
        const c  = Number(p.tarefas_concluidas || 0);
        const pct = t ? Math.round(c / t * 100) : 0;
        const vencido = p.prazo && p.prazo < hoje && !['Concluído','Arquivado'].includes(status);
        const diasP   = p.prazo ? diasRestantes(p.prazo) : null;
        const barColor = isArqP ? 'var(--text3)' : pct === 100 ? 'var(--green)' : vencido ? 'var(--red)' : 'var(--accent)';
        return `
          <div class="mapa-item clickable ${isArqP ? 'is-muted' : ''} ${vencido ? 'is-alert' : ''}" onclick="abrirProjeto('${p.id}')">
            <div class="mapa-body">
              <div class="mapa-nome status-badge-inline">
                ${isArqP ? `<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><rect x="3" y="10" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M7 10V7a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>` : ''}
                ${esc(p.nome)}
              </div>
              <div class="mapa-sub">
                ${esc(p.fase||'')} · ${c}/${t} tarefas · ${pct}%
                ${vencido && diasP !== null ? `<span class="alert">· ${diasP < 0 ? Math.abs(diasP) + 'd atraso' : 'vence hoje'}</span>` : ''}
              </div>
              <div class="mini-progress">
                <div class="mini-progress-fill" style="width:${pct}%;background:${barColor}"></div>
              </div>
            </div>
            <div class="mapa-side-meta">
              ${tag(status)}
              <div class="mapa-side-note">${fmtHoras(parseFloat(p.total_horas||0))}</div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

function renderProjeto(proj, tarefas, decisoes, abaAtiva, resumoHoras = []) {
  const statusProjeto = normalizarStatusProjeto(proj.status);
  const isArquivado = !isAdmin() && (
    normalizarStatusProjeto(proj.status) === 'Arquivado' ||
    (proj.grupo_status || null) === 'Arquivado'
  );
  const total = tarefas.length;
  const conc = tarefas.filter(t => t.status === 'Concluída').length;
  const pct = total ? Math.round(conc / total * 100) : 0;
  const focoMinha = tarefas.find(t => t.foco && t.dono_id === EU?.id);
  const focoSessaoAtiva = focoMinha
    ? Object.entries(TIMERS).find(([, t]) => t.tarefaId === focoMinha.id)
    : null;
  const focoBtnHtml = focoMinha && !isArquivado
    ? (focoSessaoAtiva
        ? `<button class="btn btn-sm btn-danger"
             onclick="pararCronometro('${focoSessaoAtiva[0]}')">■ Parar</button>`
        : `<button class="btn btn-sm btn-primary"
             onclick="iniciarCronometro('${focoMinha.id}','${esc(focoMinha.nome)}')">▶ Iniciar</button>`)
    : '';
  const dias = diasRestantes(proj.prazo);
  const urgente = dias !== null && dias <= 7 && !projetoConcluido(statusProjeto);
  const canEdit = podeEditar(proj);
  const compartilhado = Number(proj.compartilhado_comigo) === 1;

  setBreadcrumb([
    { label: 'Projetos', onClick: 'voltarDash()' },
    ...(proj.grupo_nome && proj.grupo_id
      ? [{ label: proj.grupo_nome, onClick: `abrirGrupo('${proj.grupo_id}')` }]
      : []),
    { label: proj.nome },
  ]);

  const c = document.getElementById('content');
  c.innerHTML = `
    <button class="btn-back" onclick="voltarDash()">← Voltar para projetos</button>
    <div class="proj-hero" data-status="${esc(statusProjeto)}">
      <div class="proj-hero-top">
        <div class="proj-hero-left">
          <div class="proj-nome">${esc(proj.nome)}</div>
          <div class="proj-dono">${avatar(proj.dono_nome,'avatar-sm')} <span>${esc(proj.dono_nome||'—')}</span></div>
        </div>
        <div class="proj-hero-actions">
          ${canEdit ? `<button class="btn btn-sm" onclick="modalEditarProjeto('${proj.id}')">Editar</button>` : ''}
          ${souDono(proj.dono_id) ? `<button class="btn btn-sm" onclick="modalPermissoes('${proj.id}')">Adicionar colaborador</button>` : ''}
          ${compartilhado ? `<button class="btn btn-sm" onclick="sairProjetoCompartilhado('${proj.id}','${esc(proj.nome)}')">Sair do projeto</button>` : ''}
          ${proj.total_horas > 0 ? `<button class="btn btn-sm" onclick="exportarTempoProjetoCSV('${proj.id}')">↓ CSV</button>` : ''}
        </div>
      </div>
      <div class="proj-meta">
        <div class="proj-meta-item"><span class="proj-meta-label">Status</span>${tag(statusProjeto)}</div>
      </div>
      <details class="proj-hero-details-wrap">
        <summary class="proj-hero-details-toggle">Detalhes do projeto</summary>
        <div class="proj-hero-details">
          <div class="proj-meta">
            ${compartilhado ? `<div class="proj-meta-item"><span class="proj-meta-label">Acesso</span><span class="tag tag-cyan">Compartilhado ${proj.origem_compartilhamento==='grupo'?'via grupo':'direto'}</span></div>` : ''}
            <div class="proj-meta-item"><span class="proj-meta-label">Fase</span>${tag(proj.fase, FT[proj.fase])}</div>
            <div class="proj-meta-item"><span class="proj-meta-label">Prioridade</span>${tag(proj.prioridade, PT[proj.prioridade])}</div>
            ${proj.prazo ? `<div class="proj-meta-item"><span class="proj-meta-label">Prazo</span><span class="tag ${urgente?'tag-red':'tag-gray'} mono">${prazoFmt(proj.prazo)}</span></div>` : ''}
            ${proj.area_m2 ? `<div class="proj-meta-item"><span class="proj-meta-label">Área</span><span class="tag tag-gray mono">${proj.area_m2.toLocaleString('pt-BR')} m²</span></div>` : ''}
          </div>
          ${resumoHoras?.length > 1 ? `
            <div class="proj-horas-dist">
              ${resumoHoras.map(r =>
                `<span class="proj-horas-dist-item">${avatar(r.usuario_nome,'avatar-sm')} ${esc(r.usuario_nome)}: <strong>${r.horas}h</strong></span>`
              ).join('')}
            </div>` : ''}
        </div>
      </details>
      <div class="proj-stats">
        <div class="proj-stat">
          <div class="proj-stat-label">Tarefas</div>
          <div class="proj-stat-val">${conc}/${total}</div>
        </div>
        <div class="proj-stat">
          <div class="proj-stat-label">Progresso</div>
          <div class="proj-stat-val">${pct}%</div>
        </div>
        ${dias !== null ? `<div class="proj-stat">
          <div class="proj-stat-label">Prazo</div>
          <div class="proj-stat-val ${dias <= 0 ? 'is-overdue' : urgente ? 'is-warning' : ''}">${dias <= 0 ? 'Vencido' : dias + ' dias'}</div>
        </div>` : ''}
        ${proj.total_horas > 0 ? `<div class="proj-stat">
          <div class="proj-stat-label">Horas</div>
          <div class="proj-stat-val">${parseFloat(proj.total_horas).toFixed(1)}h</div>
        </div>` : ''}
        <div class="proj-prog-wrap">
          <div class="proj-prog-bar"><div class="proj-prog-fill ${pct===100?'done':'partial'}" style="width:${pct}%"></div></div>
        </div>
      </div>
      ${focoMinha
        ? `<div class="proj-foco-banner"><span class="fl">Meu foco</span><span class="fn">${esc(focoMinha.nome)}</span>${focoBtnHtml}</div>`
        : `<div class="proj-foco-empty">Nenhuma tarefa em foco — use ★ na aba Tarefas para definir</div>`}
    </div>
    ${isArquivado ? `
      <div class="alert-banner block-gap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="10" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M7 10V7a5 5 0 0 1 10 0v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Projeto arquivado — somente leitura. Edições, novas tarefas e cronômetro estão desabilitados.
      </div>` : ''}
    <div class="abas">
      <button class="aba ${(abaAtiva==='tarefas'||abaAtiva==='lista'||abaAtiva==='kanban')?'ativa':''}" data-aba="tarefas" onclick="mudarAba('tarefas')">Tarefas</button>
      <button class="aba ${abaAtiva==='mapa'?'ativa':''}" data-aba="mapa" onclick="mudarAba('mapa')">Mapa de Foco</button>
      <button class="aba ${abaAtiva==='relatorio'?'ativa':''}" data-aba="relatorio" onclick="mudarAba('relatorio')">Relat&oacute;rio</button>
      <button class="aba ${abaAtiva==='aovivo'?'ativa':''}" data-aba="aovivo" onclick="mudarAba('aovivo')">Ao vivo</button>
    </div>
    <div id="aba"></div>
    <div id="decisoes-sec"></div>`;

  renderAba(abaAtiva, tarefas);
  renderDecisoes(proj.id, decisoes, canEdit);
}

function mudarAba(aba) {
  document.querySelectorAll('.aba').forEach(b => b.classList.toggle('ativa', b.dataset.aba === aba));
  renderAba(aba, TAREFAS);
  if (PROJETO?.id) localStorage.setItem(`telier_aba_${PROJETO.id}`, aba);
}

function renderAba(aba, tarefas) {
  const el = document.getElementById('aba');
  if (!el) return;
  TAREFAS = tarefas;
  if (aba === 'lista' || aba === 'kanban') aba = 'tarefas';
  if (aba === 'tarefas') renderAbaTarefas(el, tarefas);
  else if (aba === 'mapa') renderMapa(el, tarefas);
  else if (aba === 'relatorio') renderRelatorio(el, tarefas);
  else if (aba === 'aovivo') renderProjetoAoVivo(el);
}

async function renderProjetoAoVivo(el) {
  if (!PROJETO?.id) return;
  el.innerHTML = `<div class="loading"><div class="spinner"></div> Verificando sess&otilde;es ativas...</div>`;
  try {
    const sessoes = await carregarAoVivoProjeto(PROJETO.id);
    if (!sessoes.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-text">Nenhum cron&ocirc;metro ativo neste projeto</div><div class="empty-sub">Quando algu&eacute;m iniciar um cron&ocirc;metro em uma tarefa daqui, ele aparece nesta aba.</div></div>`;
      return;
    }
    el.innerHTML = renderAoVivoStream(sessoes, {
      titulo: 'Ao vivo do projeto',
      copy: 'Tarefas em execução dentro deste projeto.',
    });
  } catch (e) {
    el.innerHTML = `<div class="error-block">${esc(e.message)}</div>`;
  }
}

function renderAbaTarefas(el, tarefas) {
  const projetoArquivado = (
    normalizarStatusProjeto(PROJETO?.status) === 'Arquivado' ||
    (PROJETO?.grupo_status || null) === 'Arquivado'
  );
  const responsaveis = [...new Map(tarefas.map(t => [t.dono_id, { id: t.dono_id, nome: t.dono_nome }])).values()];
  const statusTabs = ['todos', 'A fazer', 'Em andamento', 'Bloqueada', 'Concluída'];
  const compartilhadas = tarefas.filter(t => tarefaCompartilhadaComigo(t)).length;
  const meus = tarefas.filter(t => t.dono_id === EU?.id).length;
  const baseFiltrada = filtrarColecaoTarefas(tarefas, { status: 'todos' });
  const filtradas = filtrarColecaoTarefas(tarefas);
  const pendentes = filtradas.filter(t => t.status !== 'Concluída').length;
  const concluidas = filtradas.filter(t => t.status === 'Concluída').length;
  const statusCountMap = Object.fromEntries(statusTabs.map(s => [s,
    s === 'todos' ? baseFiltrada.length : baseFiltrada.filter(t => t.status === s).length
  ]));

  const toolbarHtml = `
    <div class="dash-toolbar task-view-toolbar">
      <div class="dash-toolbar-row">
        <div class="task-toolbar-main">
          <input type="search" class="search-dash search-tarefa" placeholder="Buscar tarefa..."
                 value="${esc(BUSCA_TAREFA)}" oninput="filtrarTarefasBusca(this.value)">
          <div class="segmented">
            <button class="segmented-btn ${FILTRO_ORIGEM_TAREFAS==='todos'?'ativo':''}" onclick="FILTRO_ORIGEM_TAREFAS='todos';renderAbaTarefas(document.getElementById('aba'),TAREFAS)">Todas${tarefas.length ? `<span class="seg-count">${tarefas.length}</span>` : ''}</button>
            <button class="segmented-btn ${FILTRO_ORIGEM_TAREFAS==='meus'?'ativo':''}" onclick="FILTRO_ORIGEM_TAREFAS='meus';renderAbaTarefas(document.getElementById('aba'),TAREFAS)">Minhas${meus ? `<span class="seg-count">${meus}</span>` : ''}</button>
            <button class="segmented-btn ${FILTRO_ORIGEM_TAREFAS==='compartilhadas'?'ativo':''}" onclick="FILTRO_ORIGEM_TAREFAS='compartilhadas';renderAbaTarefas(document.getElementById('aba'),TAREFAS)">Compartilhadas${compartilhadas ? `<span class="seg-count">${compartilhadas}</span>` : ''}</button>
          </div>
        </div>
        <div class="task-toolbar-actions">
          <button class="btn btn-sm task-mobile-filter-btn" onclick="TASK_MOBILE_FILTERS_OPEN=!TASK_MOBILE_FILTERS_OPEN;renderAbaTarefas(document.getElementById('aba'),TAREFAS)">Filtros</button>
          <div class="view-toggle">
            <button class="view-toggle-btn ${TAREFAS_VIEW==='lista'?'ativo':''}"
                    onclick="TAREFAS_VIEW='lista';renderAbaTarefas(document.getElementById('aba'),TAREFAS)"
                    title="Vista lista">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <rect x="2" y="2" width="10" height="2" rx="1" fill="currentColor"/>
                <rect x="2" y="6" width="10" height="2" rx="1" fill="currentColor"/>
                <rect x="2" y="10" width="10" height="2" rx="1" fill="currentColor"/>
              </svg>
            </button>
            <button class="view-toggle-btn ${TAREFAS_VIEW==='kanban'?'ativo':''}"
                    onclick="TAREFAS_VIEW='kanban';renderAbaTarefas(document.getElementById('aba'),TAREFAS)"
                    title="Vista kanban">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <rect x="1" y="2" width="3.5" height="10" rx="1" fill="currentColor"/>
                <rect x="5.25" y="2" width="3.5" height="10" rx="1" fill="currentColor"/>
                <rect x="9.5" y="2" width="3.5" height="10" rx="1" fill="currentColor"/>
              </svg>
            </button>
          </div>
          ${!projetoArquivado ? `<button class="btn btn-primary btn-sm" onclick="modalNovaTarefa('${PROJETO?.id}')">+ Nova tarefa</button>` : ''}
        </div>
      </div>
      <div class="dash-toolbar-row task-mobile-secondary ${TASK_MOBILE_FILTERS_OPEN ? 'is-open' : ''}">
          <div class="task-toolbar-summary">
            ${responsaveis.length > 1 ? `
              <select class="resp-filter select-control" onchange="FILTRO_RESP_TAR=this.value;renderAbaTarefas(document.getElementById('aba'),TAREFAS)">
                <option value="">Todos os responsáveis</option>
                ${responsaveis.map(r => `<option value="${r.id}" ${FILTRO_RESP_TAR===r.id?'selected':''}>${esc(r.nome)}</option>`).join('')}
              </select>` : ''}
            ${statusTabs.map(s => {
              const label = s === 'todos' ? 'Todos' : s;
              const cnt = statusCountMap[s] || 0;
              return `<button class="filter-btn ${FILTRO_STATUS_TAREFA===s?'ativo':''}" onclick="FILTRO_STATUS_TAREFA='${esc(s)}';renderAbaTarefas(document.getElementById('aba'),TAREFAS)">${label}${cnt ? `<span class="seg-count">${cnt}</span>` : ''}</button>`;
            }).join('')}
          </div>
          <div class="task-view-kpi">${pendentes} pendente${pendentes!==1?'s':''} · ${concluidas} concluída${concluidas!==1?'s':''}</div>
        </div>
    </div>`;

  el.innerHTML = toolbarHtml + `<div id="tarefas-view-container"></div>`;
  const container = document.getElementById('tarefas-view-container');
  if (TAREFAS_VIEW === 'lista') renderListaInterna(container, tarefas);
  else renderKanbanInterno(container, tarefas);
}

function renderKanbanInterno(el, tarefas) {
  if (!el) return;

  const projetoArquivado = (
    normalizarStatusProjeto(PROJETO?.status) === 'Arquivado' ||
    (PROJETO?.grupo_status || null) === 'Arquivado'
  );
  const cols = [
    { status: 'A fazer', cor: 'var(--gray)' },
    { status: 'Em andamento', cor: 'var(--blue)' },
    { status: 'Bloqueada', cor: 'var(--red)' },
    { status: 'Concluída', cor: 'var(--green)' },
  ];

  const filtradas = filtrarColecaoTarefas(tarefas);

  const timerAtivoPorTarefa = {};
  Object.entries(TIMERS).forEach(([sid, timer]) => { timerAtivoPorTarefa[timer.tarefaId] = sid; });

  function cardHtml(t) {
    const minha = t.dono_id === EU?.id;
    const canEdit = !projetoArquivado && (minha || podeEditar(PROJETO) || isAdmin());
    const podeCron = !projetoArquivado && (minha || (t.colaboradores_ids || []).includes(EU?.id) || isAdmin());
    const sessaoAtiva = timerAtivoPorTarefa[t.id];
    const diasT = diasRestantes(t.data || null);
    const urgt = diasT !== null && diasT <= 2 && t.status !== 'Concluída';

    const cronHtml = sessaoAtiva
      ? `<button class="btn btn-danger btn-sm kanban-cron-btn"
                 onclick="pararCronometro('${sessaoAtiva}');event.stopPropagation()"
                 title="Parar cronômetro">
           <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="margin-right:3px">
             <rect x="1.5" y="1.5" width="7" height="7" rx="1" fill="currentColor"/>
           </svg>${TIMERS[sessaoAtiva] ? fmtDuracao(Math.floor((Date.now()-new Date((TIMERS[sessaoAtiva].inicio||'').replace(' ','T')+'Z').getTime())/1000)) : ''}
         </button>`
      : podeCron
        ? `<button class="btn btn-ghost btn-sm kanban-cron-btn"
                   onclick="iniciarCronometro('${t.id}','${esc(t.nome)}');event.stopPropagation()"
                   title="Iniciar cronômetro" style="color:var(--green)">
             <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="margin-right:3px">
               <path d="M3 1.5l5 3.5-5 3.5v-7z" fill="currentColor"/>
             </svg>Iniciar
           </button>`
        : '';

    const colabIds = t.colaboradores_ids || [];
    const colabNomes = t.colaboradores_nomes || [];
    const maxAvs = 3;
    const todosIds = [t.dono_id, ...colabIds];
    const todosNomes = [t.dono_nome, ...colabNomes];
    const visiveis = todosIds.slice(0, maxAvs);
    const extra = todosIds.length - maxAvs;
    const tooltipExtra = extra > 0 ? todosNomes.slice(maxAvs).join(', ') : '';

    const avsHtml = `<div class="kanban-avs">
      ${visiveis.map((id, i) => {
        const nome = todosNomes[i] || '?';
        const isDono = id === t.dono_id;
        return `<div class="avatar avatar-sm kanban-av${isDono?' kanban-av-dono':''}"
                     style="margin-left:${i>0?'-6px':'0'};border:2px solid var(--bg2)"
                     title="${esc(nome)}${isDono?' (dono)':''}">${iniciais(nome)}</div>`;
      }).join('')}
      ${extra > 0
        ? `<div class="avatar avatar-sm kanban-av-more" title="${esc(tooltipExtra)}"
               style="margin-left:-6px;border:2px solid var(--bg2)">+${extra}</div>`
        : ''}
    </div>`;

    const borderStyle = t.foco && minha
      ? 'border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0'
      : t.status === 'Bloqueada'
        ? 'border-left:3px solid var(--red);border-radius:0 var(--r) var(--r) 0'
        : '';

    const isConcluida = t.status === 'Concluída';

    return `<div class="kanban-card" draggable="true" data-tarefa-id="${t.id}"
                 style="${borderStyle}"
                 ondragstart="event.dataTransfer.setData('tarefaId',this.dataset.tarefaId)"
                 onclick="modalEditarTarefa('${t.id}')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:6px">
        <div style="font-size:var(--fs-090);color:${isConcluida?'var(--text3)':'var(--text)'};
                    ${isConcluida?'text-decoration:line-through;':''}line-height:1.35;flex:1">
          ${esc(t.nome)}
        </div>
        ${minha ? `<button class="foco-pin ${t.foco?'ativo':''}" style="font-size:14px;flex-shrink:0"
                            onclick="toggleFoco('${t.id}',${!!t.foco});event.stopPropagation()"
                            title="${t.foco?'Remover foco':'Marcar como foco'}">${t.foco?'★':'☆'}</button>` : ''}
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
        ${tag(t.prioridade, PT[t.prioridade])}
        ${t.data
          ? `<span class="tag ${urgt?(diasT<=0?'tag-red':'tag-yellow'):'tag-gray'} mono" style="font-size:var(--fs-075)">
               ${urgt?`<svg width="9" height="9" viewBox="0 0 24 24" fill="none" style="vertical-align:-1px;margin-right:1px"><path d="M12 3.5l9 15.5H3l9-15.5z" stroke="currentColor" stroke-width="2"/><path d="M12 9v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16.7" r="1" fill="currentColor"/></svg>`:''}${diasT<=0?'vencida':prazoFmt(t.data,true)}
             </span>`
          : ''}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:8px;gap:6px">
        ${avsHtml}
        <div style="display:flex;gap:4px;align-items:center" onclick="event.stopPropagation()">
          ${cronHtml}
          ${canEdit && !isConcluida ? `
            <button class="btn btn-ghost btn-icon btn-sm"
                    onclick="modalEditarTarefa('${t.id}');event.stopPropagation()"
                    title="Editar">
              <svg width="12" height="12" viewBox="0 0 13 13" fill="none">
                <path d="M2 9.5V11h1.5l5.5-5.5-1.5-1.5L2 9.5zM10.85 2.65a1 1 0 0 0-1.42 0l-.79.79 1.42 1.42.79-.79a1 1 0 0 0 0-1.42z" fill="currentColor"/>
              </svg>
            </button>` : ''}
        </div>
      </div>
    </div>`;
  }

  function inlineAddHtml(status) {
    const canCreate = !projetoArquivado && (podeEditar(PROJETO) || isAdmin());
    if (!canCreate) return '';
    const inputId = `kb-add-${status.replace(/\s/g,'_')}`;
    return `<div class="kb-inline-add">
      <input type="text" id="${inputId}" class="kb-inline-input"
             placeholder="+ Nova tarefa"
             onkeydown="if(event.key==='Enter'&&this.value.trim()){
               criarTarefaKanban(this.value.trim(),'${status}');this.value='';
             } else if(event.key==='Escape'){this.blur();}"
             onclick="event.stopPropagation()">
    </div>`;
  }

  let kbConclExpand = sessionStorage.getItem('kb_concl_expand') === '1';

  const colsHtml = cols.map(({ status, cor }) => {
    const items = filtradas.filter(t => t.status === status);
    const isConc = status === 'Concluída';
    const mostrar = isConc ? items.slice(0, kbConclExpand ? undefined : 2) : items;
    const extra = isConc && !kbConclExpand && items.length > 2 ? items.length - 2 : 0;

    return `<div class="kanban-col" data-status="${status}"
                 ondragover="event.preventDefault();this.classList.add('drag-over')"
                 ondragleave="this.classList.remove('drag-over')"
                 ondrop="this.classList.remove('drag-over');mudarStatus(event.dataTransfer.getData('tarefaId'),'${status}',null)">
      <div class="kanban-col-header" style="border-top-color:${cor}">
        ${status}
        ${items.length > 0 ? `<span style="color:var(--text3);font-weight:400">${items.length}</span>` : ''}
      </div>
      ${mostrar.map(cardHtml).join('')}
      ${extra > 0 ? `<div style="text-align:center;font-size:var(--fs-075);color:var(--text3);padding:6px 0;cursor:pointer"
                         onclick="sessionStorage.setItem('kb_concl_expand','1');renderKanbanInterno(this.closest('#tarefas-view-container,#aba'),TAREFAS)">
                       + ${extra} mais
                     </div>` : ''}
      ${inlineAddHtml(status)}
    </div>`;
  }).join('');

  el.innerHTML = `<div class="task-view-surface"><div class="kanban-board">${colsHtml}</div></div>`;
}

async function criarTarefaKanban(nome, status) {
  if (!PROJETO?.id || !nome.trim()) return;
  try {
    await req('POST', `/projetos/${PROJETO.id}/tarefas`, {
      nome: nome.trim(),
      status,
      prioridade: 'Média',
      complexidade: 'Moderada',
    });
    await recarregarProjeto('tarefas');
  } catch (e) { toast(e.message, 'err'); }
}

// ── LISTA ──
function renderColabsStack(ids = [], max = 3) {
  const visible = ids.slice(0, max);
  const extra = ids.length - max;
  const html = visible.map(id => {
    const u = USUARIOS.find(u => u.id === id);
    return u ? avatar(u.nome, 'avatar-sm') : '';
  }).join('');
  return `<div class="colabs-stack">${html}${
    extra > 0 ? `<span class="colabs-stack-more">+${extra}</span>` : ''
  }</div>`;
}

function renderListaInterna(el, tarefas) {

    normalizarStatusProjeto(PROJETO?.status) === 'Arquivado' ||

  const pendFilt = tarefasFiltradas.filter(t => t.status !== 'Concluída');
  const concFilt = tarefasFiltradas.filter(t => t.status === 'Concluída');

  let pendOrdenadas = [...pendFilt];
  let concOrdenadas = [...concFilt];
  if (LISTA_SORT.col) {
    const dir = LISTA_SORT.dir === 'asc' ? 1 : -1;
    const comparar = (a, b) => {
      if (LISTA_SORT.col === 'nome') return dir * a.nome.localeCompare(b.nome);
      if (LISTA_SORT.col === 'prioridade') return dir * ((PO[a.prioridade] ?? 1) - (PO[b.prioridade] ?? 1));
      if (LISTA_SORT.col === 'complexidade') return dir * ((DO[a.complexidade] ?? 1) - (DO[b.complexidade] ?? 1));
      if (LISTA_SORT.col === 'data') {
        const da = a.data || '9999-99-99';
        const db = b.data || '9999-99-99';
        return dir * da.localeCompare(db);
      }
      return 0;

    pendOrdenadas.sort(comparar);
    concOrdenadas.sort(comparar);

        ${canEdit ? `<button class="btn btn-danger btn-icon btn-sm" onclick="deletarTarefa('${t.id}')" title="Excluir tarefa"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 1.5l9 9M10.5 1.5l-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>` : ''}
      </div></td>

function ordenarLista(col) {
  if (LISTA_SORT.col === col) {
    LISTA_SORT.dir = LISTA_SORT.dir === 'asc' ? 'desc' : 'asc';
  } else {
    LISTA_SORT.col = col;
    LISTA_SORT.dir = 'asc';
  }
  const el = document.getElementById('tarefas-view-container') || document.getElementById('aba');
  if (el) renderListaInterna(el, TAREFAS);
}

// ── MAPA DE FOCO ──
function renderMapa(el, tarefas) {
  const pendentes = [...tarefas.filter(t => t.status !== 'Concluída' && t.status !== 'Bloqueada')]
    .sort((a, b) => {
      const p = (PO[a.prioridade]??1) - (PO[b.prioridade]??1);
      if (p) return p;
      const d = (DO[a.complexidade]??1) - (DO[b.complexidade]??1);
      if (d) return d;
      const da = a.data || '9999-99-99';
      const db = b.data || '9999-99-99';
      return da.localeCompare(db);
    });

  if (!pendentes.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon" aria-hidden="true"><svg width="36" height="36" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M8 12.5l2.6 2.6L16.5 9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="empty-text">Todas as tarefas concluídas</div></div>`;
    return;
  }

  const bloqueadas = tarefas.filter(t => t.status === 'Bloqueada');
  el.innerHTML = `
    <div class="task-view-surface">
      <div class="task-view-head">
        <div>
          <div class="task-view-eyebrow">Mapa de foco</div>
          <div class="task-view-title">${pendentes.length} prioridade${pendentes.length !== 1 ? 's' : ''} em sequência</div>
          <div class="task-view-copy">Ordenado por prioridade, complexidade e prazo. A tarefa #01 é o melhor ponto de partida.</div>
        </div>
        <div class="task-view-kpi">${bloqueadas.length} bloqueada${bloqueadas.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="mapa-intro">Use esta fila para decidir a próxima tarefa a iniciar sem perder contexto.</div>
      ${bloqueadas.length ? `
        <div class="task-view-surface" style="padding:12px 14px;background:rgba(231,68,68,.06);border-color:rgba(231,68,68,.2);box-shadow:none">
          <div class="task-view-eyebrow" style="color:var(--red)">Bloqueadas</div>
          <div class="task-view-copy" style="color:var(--red)">Não iniciar agora:</div>
          <div class="task-status-strip">
            ${bloqueadas.map(t => `<span class="tag tag-red">${esc(t.nome)}</span>`).join('')}
          </div>
        </div>` : ''}
      <div class="mapa-list">
        ${pendentes.map((t, i) => {
          const minha = t.dono_id === EU?.id;
          const podeCron = minha || (t.colaboradores_ids||[]).includes(EU?.id) || isAdmin();
          const sessaoAtiva = Object.entries(TIMERS).find(([,timer]) => timer.tarefaId === t.id)?.[0];
          const diasT = diasRestantes(t.data || null);
          const urgt = diasT !== null && diasT <= 2;

          const cronHtml = sessaoAtiva
            ? `<button class="btn btn-danger btn-sm"
                       onclick="pararCronometro('${sessaoAtiva}');event.stopPropagation()"
                       style="flex-shrink:0">
                 <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="margin-right:3px">
                   <rect x="1.5" y="1.5" width="7" height="7" rx="1" fill="currentColor"/>
                 </svg>Parar
               </button>`
            : podeCron
              ? `<button class="btn btn-ghost btn-sm"
                         onclick="iniciarCronometro('${t.id}','${esc(t.nome)}');event.stopPropagation()"
                         style="color:var(--green);flex-shrink:0">
                   <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style="margin-right:3px">
                     <path d="M3 1.5l5 3.5-5 3.5v-7z" fill="currentColor"/>
                   </svg>Iniciar
                 </button>`
              : '';

          return `

// ── RELATÓRIO ──
async function renderRelatorio(el, tarefas) {
  const projetoId = PROJETO?.id;

  // Usar cache se válido (mesmo projeto, menos de 30s)
  let resumoMap;
  if (RELATORIO_CACHE && RELATORIO_CACHE.projetoId === projetoId && (Date.now() - RELATORIO_CACHE.ts) < 60000) {
    resumoMap = RELATORIO_CACHE.resumoMap;
  } else {
    el.innerHTML = `<div class="loading"><div class="spinner"></div> Calculando horas...</div>`;
    const byTarefa = await req('GET', `/projetos/${projetoId}/relatorio`);
    resumoMap = byTarefa;
    RELATORIO_CACHE = { projetoId, ts: Date.now(), resumoMap };
  }

  const grupos = {};
  tarefas.forEach(t => { (grupos[t.status] = grupos[t.status]||[]).push(t); });
  const grpOrder = ['Em andamento','Bloqueada','A fazer','Concluída'];

  function horasItem(tarefaId) {
    const resumo = resumoMap[tarefaId] || [];
    if (!resumo.length) return '';
    const total = resumo.reduce((s,r) => s + (parseFloat(r.horas_liquidas)||0), 0);
    const detalhe = resumo.length > 1
      ? resumo.map(r => `<span class="text-xxs text-muted">${esc(r.usuario_nome)}: ${fmtHoras(parseFloat(r.horas_liquidas||0))}</span>`).join(' · ')
      : '';
    return `<div style="text-align:right">
      <div class="rel-horas">${fmtHoras(total)}</div>
      ${detalhe ? `<div class="inline-detail-row">${detalhe}</div>` : ''}
    </div>`;
  }

  let html = '';
  grpOrder.forEach(s => {
    if (!grupos[s]?.length) return;
    const lista = grupos[s];
    const totalGrupo = lista.reduce((sum, t) => {
      const r = resumoMap[t.id] || [];
      return sum + r.reduce((s2,r2) => s2 + (parseFloat(r2.horas_liquidas)||0), 0);
    }, 0);
    html += `<div class="rel-group">
      <div class="rel-group-header">
        <div class="rel-group-title">${tag(s)} <span>${lista.length}</span></div>
        ${totalGrupo > 0 ? `<div class="rel-group-total">${fmtHoras(totalGrupo)}</div>` : ''}
      </div>
      ${lista.map(t => `
        <div class="rel-item" style="cursor:pointer"
             onclick="expandirSessoes('${t.id}')"
             title="Ver detalhes de tempo desta tarefa">
          <div class="rel-nome">${esc(t.nome)}</div>
          <div class="resp-chip">${avatar(t.dono_nome,'avatar-sm')}</div>
          ${horasItem(t.id)}
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="color:var(--text3);flex-shrink:0">
            <path d="M4.5 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>`).join('')}
    </div>`;
  });

  const exportBtn = PROJETO?.id && Object.values(resumoMap).some(r => r.length > 0)
    ? `<button class="btn btn-sm" onclick="exportarTempoProjetoCSV('${PROJETO.id}')">
         ↓ Exportar CSV
       </button>`
    : '';
  const totalHorasProjeto = Object.values(resumoMap).reduce((sum, lista) =>
    sum + (lista || []).reduce((acc, item) => acc + (parseFloat(item.horas_liquidas) || 0), 0)
  , 0);

  el.innerHTML = `
    <div class="task-view-surface">
      <div class="task-view-head">
        <div>
          <div class="task-view-eyebrow">Relatório do projeto</div>
          <div class="task-view-title">${tarefas.length} tarefa${tarefas.length !== 1 ? 's' : ''}</div>
          <div class="task-view-copy">Tempo registrado por status e por tarefa.</div>
        </div>
        ${exportBtn || `<div class="task-view-kpi">${fmtHoras(totalHorasProjeto)}</div>`}
      </div>
      ${html || `<div class="empty-state"><div class="empty-icon" aria-hidden="true"><svg width="36" height="36" viewBox="0 0 24 24" fill="none"><rect x="7" y="4" width="10" height="15" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M10 4.5h4M10 9h4M10 12h4M10 15h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div><div class="empty-text">Nenhuma tarefa</div></div>`}
    </div>`;
}

async function mudarStatus(tarefaId, novoStatus, selEl) {
  const statusAnterior = TAREFAS.find(t => t.id === tarefaId)?.status;
  if (selEl) { selEl.disabled = true; selEl.style.opacity = '0.5'; }
  try {
    await req('PATCH', `/tarefas/${tarefaId}`, { status: novoStatus });
    TAREFAS = TAREFAS.map(t => t.id === tarefaId ? { ...t, status: novoStatus } : t);
    RELATORIO_CACHE = null;
    toast('Status atualizado');
    // Atualizar hero do projeto se estiver na página
    if (PROJETO) {
      const conc = TAREFAS.filter(t => t.status === 'Concluída').length;
      const pct = TAREFAS.length ? Math.round(conc / TAREFAS.length * 100) : 0;
      const fill = document.querySelector('.proj-prog-fill');
      const txt = document.querySelector('.proj-prog-text');
      if (fill) { fill.style.width = pct + '%'; fill.className = 'proj-prog-fill ' + (pct===100?'done':'partial'); }
      if (txt) txt.textContent = `${conc}/${TAREFAS.length} concluídas · ${pct}%`;
    }
  } catch (e) {
    toast(e.message, 'err');
    if (selEl && statusAnterior) selEl.value = statusAnterior;
  } finally {
    if (selEl) { selEl.disabled = false; selEl.style.opacity = ''; }
  }
}

    req('GET', `/projetos/${PROJETO.id}`),

// PERMISSÕES
async function modalPermissoes(projetoId) {
  if (!USUARIOS.length) USUARIOS = await req('GET', '/usuarios');
  const proj = PROJETO?.id === projetoId ? PROJETO : await req('GET', `/projetos/${projetoId}`);
  const editores = [...(proj.editores || [])].sort((a, b) => {
    if ((a.origem || 'manual') === (b.origem || 'manual')) return (a.nome || '').localeCompare(b.nome || '');
    return (a.origem || 'manual') === 'manual' ? -1 : 1;
  });
  const editIds = editores.map(e => e.usuario_id);
  const disponiveis = USUARIOS.filter(u => u.id !== proj.dono_id && !editIds.includes(u.id));

  const editorRows = editores.map(e => `
    <div class="editor-row">
      <div class="editor-info">${avatar(e.nome)} ${esc(e.nome)} <span class="inline-user-handle">@${esc(e.usuario_login)}</span> ${e.origem === 'grupo' ? tag('Herdado do grupo', 'tag-gray', 'Acesso vindo do grupo do projeto') : tag('Manual', 'tag-cyan', 'Acesso dado diretamente no projeto')}</div>
      ${e.origem === 'grupo'
        ? `<span class="inline-muted-sm">Remova no grupo para revogar</span>`
        : `<button class="editor-del" onclick="removerPerm('${projetoId}','${e.usuario_id}')" title="Remover"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 1.5l9 9M10.5 1.5l-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>`}
    </div>`).join('') || `<div class="inline-muted-sm">Nenhum colaborador adicionado</div>`;

  abrirModal(`
    <h2>Colaboradores do projeto</h2>
    <p class="modal-copy">Acesso manual vale só neste projeto. Acesso herdado vem do grupo atual e deve ser gerenciado na janela do grupo.</p>
    <div class="form-row"><label>Colaboradores com acesso</label><div class="editor-list">${editorRows}</div></div>
    ${disponiveis.length ? `
    <div class="form-sep"></div>
    <div class="form-row"><label>Adicionar colaborador (usuários registrados)</label>
      <div style="display:flex;gap:8px">
        <select id="m-editor" style="flex:1">${disponiveis.map(u=>`<option value="${u.id}">${esc(u.nome)} (@${esc(u.usuario_login)})</option>`).join('')}</select>
        <button class="btn btn-sm btn-primary" id="btn-add-perm" onclick="adicionarPerm('${projetoId}')">Adicionar</button>
      </div>
    </div>` : `<div class="inline-muted-sm" style="margin-top:8px">Todos os usuários cadastrados já foram adicionados.</div>`}
    <div class="modal-footer"><button class="btn" onclick="fecharModal()">Fechar</button></div>`, { lg: true });
}

// ── EXPORTAÇÃO CSV ──
async function exportarTempoProjetoCSV(projetoId) {
  try {
    toast('Gerando CSV...');
    const projetoNome = PROJETO?.nome || 'projeto';
    const tarefas = await req('GET', `/projetos/${projetoId}/tarefas`);
    const linhas = [['Tarefa','Origem','Início','Fim','Horas líquidas','Intervalos']];
    for (const t of tarefas) {
      const sessoes = await req('GET', `/tarefas/${t.id}/tempo`);
      for (const s of sessoes) {
        const intervalosStr = (s.intervalos || [])
          .map(i => `${i.tipo}(${i.inicio}→${i.fim || 'aberto'})`).join('; ');
        linhas.push([
          csvEsc(t.nome), csvEsc(s.usuario_nome || ''),
          csvEsc(s.inicio || ''), csvEsc(s.fim || ''),
          String(s.horas_liquidas || 0), csvEsc(intervalosStr),
        ]);
      }
    }
    const csv = linhas.map(r => r.join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `telier_${projetoNome.replace(/\s+/g,'_')}_tempo.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast('CSV exportado');
  } catch (err) { toast(err.message, 'err'); }
}

// ── PRESENÇA ONLINE ──
async function carregarColegasAtivos() {
  if (!TOKEN) {
    COLEGAS_ATIVOS = [];
    _presenceHintShown = false;
    renderPresenceDock();
    return;
  }
  try {
    const data = await req('GET', '/tempo/colegas-ativos');
    COLEGAS_ATIVOS = Array.isArray(data)
      ? data
      : Array.isArray(data?.results)
        ? data.results
        : [];
    if (!COLEGAS_ATIVOS.length && !_presenceHintShown) {
      _presenceHintShown = true;
      toast('Nenhum colaborador ativo agora');
    }
    if (COLEGAS_ATIVOS.length) _presenceHintShown = false;
    renderPresenceDock();
  } catch {
    COLEGAS_ATIVOS = [];
    renderPresenceDock();
  }
}

function iniciarPollPresenca() {
  if (!TOKEN) return;
  if (_presenceTick) clearInterval(_presenceTick);
  _presenceTick = setInterval(carregarColegasAtivos, 30000);
  carregarColegasAtivos();
}

function renderPresenceDock() {
  const dock = document.getElementById('presence-dock');
  if (!dock) return;
  document.body.classList.toggle('has-presence', COLEGAS_ATIVOS.length > 0);
  const topbarPresence = document.getElementById('topbar-presence');
  if (topbarPresence) {
    if (COLEGAS_ATIVOS.length > 0) {
      const avatarsHtml = COLEGAS_ATIVOS.slice(0, 3)
        .map(c => avatar(c.usuario_nome, 'avatar-sm')).join('');
      topbarPresence.innerHTML = `
        <button class="topbar-presence-chip"
                onclick="togglePresencePanel()"
                title="${COLEGAS_ATIVOS.length} colega(s) online">
          <span class="presence-live-dot"></span>
          <div class="topbar-presence-avatars">${avatarsHtml}</div>
          <span class="topbar-presence-count">${COLEGAS_ATIVOS.length}</span>
        </button>`;
      topbarPresence.style.display = '';
    } else {
      topbarPresence.style.display = 'none';
    }
  }
  if (!COLEGAS_ATIVOS.length) {
    clearInterval(window._presenceDisplayTick);
    dock.innerHTML = '';
    return;
  }

  const avatarsHtml = COLEGAS_ATIVOS.slice(0, 3)
    .map(c => avatar(c.usuario_nome, 'avatar-sm')).join('');

  const toggleHtml = `
    <button class="presence-toggle" onclick="togglePresencePanel()" title="Colaboradores ativos agora">
      <div class="presence-online-dot"></div>
      <div class="presence-toggle-avatars">${avatarsHtml}</div>
      <span class="presence-count">${COLEGAS_ATIVOS.length} ativo${COLEGAS_ATIVOS.length === 1 ? '' : 's'}</span>
    </button>`;

  if (!PRESENCE_ABERTO) { dock.innerHTML = toggleHtml; return; }

  const itemsHtml = COLEGAS_ATIVOS.map(c => {
    const inicioIso = String(c.inicio || '').replace(' ', 'T');
    const inicioMs = Date.parse(inicioIso.endsWith('Z') ? inicioIso : `${inicioIso}Z`);
    const seg = Number.isFinite(inicioMs) ? Math.floor((Date.now() - inicioMs) / 1000) : 0;
    const clickAbrir = c.projeto_id ? `abrirProjeto('${c.projeto_id}')` : 'return';
    return `
      <div class="presence-item" onclick="${clickAbrir}" title="${c.projeto_id ? 'Abrir projeto' : 'Sem projeto ativo'}">
        ${avatar(c.usuario_nome, 'avatar-sm')}
        <div class="presence-item-info">
          <div class="presence-item-nome">${esc(c.usuario_nome)}</div>
          <div class="presence-item-tarefa">${esc(c.tarefa_nome || 'Sem cronômetro ativo')}</div>
          <div class="presence-item-projeto">${esc(c.projeto_nome || 'Disponível')}</div>
        </div>
        <div class="presence-item-tempo">${fmtDuracao(seg)}</div>
      </div>`;
  }).join('');

  dock.innerHTML = `
    <div class="presence-panel">
      <div class="presence-panel-header">Ativos agora</div>
      ${itemsHtml}
    </div>
    ${toggleHtml}`;

  clearInterval(window._presenceDisplayTick);
  window._presenceDisplayTick = setInterval(() => {
    if (!PRESENCE_ABERTO) return;
    COLEGAS_ATIVOS.forEach((c, idx) => {
      const inicioIso = String(c.inicio || '').replace(' ', 'T');
      const inicioMs = Date.parse(inicioIso.endsWith('Z') ? inicioIso : `${inicioIso}Z`);
      const seg = Number.isFinite(inicioMs) ? Math.floor((Date.now() - inicioMs) / 1000) : 0;
      const els = dock.querySelectorAll('.presence-item-tempo');
      if (els[idx]) els[idx].textContent = fmtDuracao(seg);
    });
  }, 1000);
}

function togglePresencePanel() {
  PRESENCE_ABERTO = !PRESENCE_ABERTO;
  renderPresenceDock();
  if (PRESENCE_ABERTO) {
    setTimeout(() => {
      document.addEventListener('click', fecharPresencePanelFora, { once: true, capture: true });
    }, 10);
  }
}

function fecharPresencePanelFora(e) {
  const dock = document.getElementById('presence-dock');
  if (dock && !dock.contains(e.target)) {
    PRESENCE_ABERTO = false;
    renderPresenceDock();
  } else if (PRESENCE_ABERTO) {
    setTimeout(() => {
      document.addEventListener('click', fecharPresencePanelFora, { once: true, capture: true });
    }, 10);
  }
}

function detalhesTaskKey(tarefaId) {
  return `telier_tarefa_detalhes_${tarefaId}`;
}

function listarDetalhesTarefa(tarefaId) {
  try {
    const raw = localStorage.getItem(detalhesTaskKey(tarefaId));
    const arr = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(arr)) return [];
    return arr.map(item => {
      if (typeof item === 'string') return { text: item.trim(), done: false };
      if (item && typeof item.text === 'string') return { text: item.text.trim(), done: !!item.done };
      return null;
    }).filter(item => item && item.text);
  } catch {
    return [];
  }
}

function salvarDetalhesTarefa(tarefaId, itens) {
  localStorage.setItem(detalhesTaskKey(tarefaId), JSON.stringify(itens));
}

function htmlDetalhesTarefa(tarefaId) {
  const itens = listarDetalhesTarefa(tarefaId);
  const itensHtml = itens.map((item, idx) => `
    <div class="task-detail-item ${item.done ? 'done' : ''}">
      <div class="task-detail-left">
        <input class="task-detail-check" type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleDetalheTarefa('${tarefaId}',${idx},this.checked)">
        <div class="task-detail-text">${esc(item.text)}</div>
      </div>
      <button class="btn btn-danger btn-icon btn-sm" onclick="removerDetalheTarefa('${tarefaId}',${idx})" title="Remover detalhe">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 1.5l9 9M10.5 1.5l-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>`).join('');

  return `
    <div class="task-details-header">Detalhes da tarefa</div>
    <div class="task-details-add">
      <input id="task-det-input-${tarefaId}" onkeydown="adicionarDetalheTarefaEnter(event,'${tarefaId}')" placeholder="Ex: Pendência com fornecedor, material faltando, ponto de atenção...">
      <button class="btn btn-primary btn-sm" onclick="adicionarDetalheTarefa('${tarefaId}')">Adicionar</button>
    </div>
    <div class="task-details-list">${itensHtml || '<div class="inline-muted-sm">Nenhum detalhe adicionado ainda.</div>'}</div>`;
}

function atualizarDetalhesTarefaUI(tarefaId) {
  const el = document.getElementById(`task-details-${tarefaId}`);
  if (!el) return;
  el.innerHTML = htmlDetalhesTarefa(tarefaId);
}

function adicionarDetalheTarefa(tarefaId) {
  const input = document.getElementById(`task-det-input-${tarefaId}`);
  if (!input) return;
  const txt = input.value.trim();
  if (!txt) return;
  const itens = listarDetalhesTarefa(tarefaId);
  itens.push({ text: txt, done: false });
  salvarDetalhesTarefa(tarefaId, itens);
  atualizarDetalhesTarefaUI(tarefaId);
  const inputNovo = document.getElementById(`task-det-input-${tarefaId}`);
  if (inputNovo) inputNovo.focus();
}

function adicionarDetalheTarefaEnter(ev, tarefaId) {
  if (ev.key !== 'Enter') return;
  ev.preventDefault();
  adicionarDetalheTarefa(tarefaId);
}

function toggleDetalheTarefa(tarefaId, idx, done) {
  const itens = listarDetalhesTarefa(tarefaId);
  if (!itens[idx]) return;
  itens[idx].done = !!done;
  salvarDetalhesTarefa(tarefaId, itens);
  atualizarDetalhesTarefaUI(tarefaId);
}

function removerDetalheTarefa(tarefaId, idx) {
  const itens = listarDetalhesTarefa(tarefaId);
  itens.splice(idx, 1);
  salvarDetalhesTarefa(tarefaId, itens);
  atualizarDetalhesTarefaUI(tarefaId);
}

async function expandirSessoes(tarefaId) {
  const tarefa = TAREFAS.find(t => t.id === tarefaId);
  const nome = tarefa?.nome || tarefaId;

  abrirModal(`
    <h2>Registro de tempo</h2>
    <p class="modal-copy">Tarefa: <strong class="inline-note-strong">${esc(nome)}</strong></p>
    <div class="sessoes-kpi"><span class="sessoes-kpi-label">Total líquido</span><span class="sessoes-kpi-val" id="sess-total-${tarefaId}">--</span></div>
    <div id="sess-inner"><div class="loading"><div class="spinner"></div></div></div>
    <div class="task-details-panel" id="task-details-${tarefaId}">${htmlDetalhesTarefa(tarefaId)}</div>
    <div class="modal-footer">
      <button class="btn" onclick="fecharModal()">Fechar</button>
    </div>
  `, { lg: true });

  await renderSessoesTarefa(tarefaId, document.getElementById('sess-inner'));
}

// ── CRONÔMETRO ──
let TIMERS = {}; // { sessaoId: { tarefaId, tarefa_nome, projeto_nome, projeto_id, inicio, intervalo } }
const SESSAO_TICKS = new Map();

function limparTicksSessao(tarefaId) {
  const ids = SESSAO_TICKS.get(tarefaId) || [];
  ids.forEach(clearInterval);
  SESSAO_TICKS.delete(tarefaId);
}

function fmtDuracao(segundos) {
  const h = Math.floor(segundos / 3600);
  const m = Math.floor((segundos % 3600) / 60);
  const s = Math.floor(segundos % 60);
  return h > 0
    ? `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function fmtHoras(horas) {
  const totalMin = Math.round((horas || 0) * 60);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return `${h}h ${String(m).padStart(2, '0')}min`;
}

function fmtDatetime(iso) {
  if (!iso) return '—';
  const d = new Date(iso.replace(' ', 'T') + 'Z');
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function fmtDatetimeInput(iso) {
  if (!iso) return '';
  return (iso.replace(' ', 'T') + 'Z').replace('Z','').slice(0,16);
}

function agora() {
  return new Date().toISOString().slice(0, 19).replace('T', ' ');
}

async function carregarTimersAtivos() {
  try {
    const ativas = await req('GET', '/tempo/ativas');
    for (const s of ativas) {
      if (!TIMERS[s.id]) {
        TIMERS[s.id] = {
          tarefaId: s.tarefa_id,
          tarefa_nome: s.tarefa_nome,
          projeto_nome: s.projeto_nome,
          projeto_id: s.projeto_id,
          inicio: s.inicio,
        };
      }
    }
    renderTimerDock();
    atualizarTempoListaVisivel();
  } catch {}
}

function atualizarTempoListaVisivel() {
  const abaEl = document.getElementById('aba');
  if (!abaEl || !PROJETO) return;
  const abaAtiva = document.querySelector('.aba.ativa')?.dataset.aba;
  if (abaAtiva !== 'tarefas' && abaAtiva !== 'lista' && abaAtiva !== 'kanban') return;
  renderAbaTarefas(abaEl, TAREFAS);
}

async function iniciarCronometro(tarefaId, tarefaNome) {
  try {
    const { id, inicio } = await req('POST', `/tarefas/${tarefaId}/tempo`, { inicio: agora() }).catch(e => {
      if (e.message.includes('permissão')) throw new Error('Você precisa ser colaborador desta tarefa para cronometrar');
      throw e;
    });
    TIMERS[id] = {
      tarefaId,
      tarefa_nome: tarefaNome,
      projeto_nome: PROJETO?.nome || '',
      projeto_id: PROJETO?.id || '',
      inicio,
    };
    renderTimerDock();
    atualizarTempoListaVisivel();
    toast('Cronômetro iniciado');
    carregarColegasAtivos();
  } catch (e) { toast(e.message, 'err'); }
}

async function pararCronometro(sessaoId) {
  try {
    await req('PUT', `/tempo/${sessaoId}/parar`, { fim: agora() });
    delete TIMERS[sessaoId];
    renderTimerDock();
    atualizarTempoListaVisivel();
    toast('Cronômetro parado');
    RELATORIO_CACHE = null;
    carregarColegasAtivos();
    // Recarregar se estiver na página do projeto certo
    if (PROJETO) await recarregarProjeto();
  } catch (e) { toast(e.message, 'err'); }
}

function renderTimerDock() {
  const dock = document.getElementById('timer-dock');
  if (!dock) return;
  const ids = Object.keys(TIMERS);
  if (!ids.length) { dock.innerHTML = ''; return; }

  dock.innerHTML = ids.map(sessaoId => {
    const t = TIMERS[sessaoId];
    const segundos = Math.floor((Date.now() - new Date(t.inicio.replace(' ','T') + 'Z').getTime()) / 1000);
    const horas = segundos / 3600;
    const longo = horas >= TIMER_AVISO_HORAS;
    return `
      <div class="timer-card ativo${longo ? ' timer-longo' : ''}" id="tcard-${sessaoId}">
        <div class="timer-card-proj">${esc(t.projeto_nome)}</div>
        <div class="timer-card-header">
          <div class="timer-dot"></div>
          <div class="timer-card-nome">${esc(t.tarefa_nome)}</div>
        </div>
        <div class="timer-display${longo ? ' timer-alerta' : ''}" id="tdisp-${sessaoId}">${fmtDuracao(segundos)}</div>
        ${longo ? `<div class="timer-aviso"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="vertical-align:-2px;margin-right:4px"><path d="M12 3.5l9 15.5H3l9-15.5z" stroke="currentColor" stroke-width="1.9"/><path d="M12 9v5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><circle cx="12" cy="16.7" r="1" fill="currentColor"/></svg>Timer rodando há mais de ${Math.floor(horas)}h</div>` : ''}
        <div class="timer-actions">
          <button class="btn btn-sm" onclick="modalAdicionarIntervalo('${sessaoId}')"><svg width="11" height="11" viewBox="0 0 11 11" fill="none" style="margin-right:4px"><path d="M5.5 2v7M2 5.5h7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>Intervalo</button>
          <button class="btn btn-sm btn-danger" onclick="pararCronometro('${sessaoId}')"><svg width="11" height="11" viewBox="0 0 11 11" fill="none" style="margin-right:4px"><rect x="2" y="2" width="7" height="7" rx="1" fill="currentColor"/></svg>Parar</button>
        </div>
      </div>`;
  }).join('');

  // Atualizar displays a cada segundo
  clearInterval(window._timerTick);
  window._timerTick = setInterval(() => {
    Object.entries(TIMERS).forEach(([sid, t]) => {
      const el = document.getElementById('tdisp-' + sid);
      if (!el) return;
      const seg = Math.floor((Date.now() - new Date(t.inicio.replace(' ','T') + 'Z').getTime()) / 1000);
      el.textContent = fmtDuracao(seg);
      const card = document.getElementById('tcard-' + sid);
      if (card && seg / 3600 >= TIMER_AVISO_HORAS) {
        card.classList.add('timer-longo');
        el.classList.add('timer-alerta');
      }
    });
  }, 1000);
}

function modalAdicionarIntervalo(sessaoId) {
  abrirModal(`
    <h2>Adicionar intervalo</h2>
    <div class="form-row"><label>Tipo</label><input id="m-tipo" placeholder="Ex: Lanche, Reunião, Problema técnico..."></div>
    <div class="form-grid">
      <div class="form-row"><label>Início</label><input type="datetime-local" id="m-ini" value="${new Date().toISOString().slice(0,16)}"></div>
      <div class="form-row"><label>Fim (opcional)</label><input type="datetime-local" id="m-fim"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-add-int" onclick="criarIntervalo('${sessaoId}')">Adicionar</button>
    </div>`);
}

async function criarIntervalo(sessaoId) {
  const tipo = gv('m-tipo').trim();
  if (!tipo) { toast('Tipo obrigatório', 'err'); return; }
  btnLoading('btn-add-int', true);
  try {
    const ini = gv('m-ini').replace('T', ' ');
    const fim = gv('m-fim') ? gv('m-fim').replace('T', ' ') : null;
    await req('POST', `/tempo/${sessaoId}/intervalos`, { tipo, inicio: ini, fim });
    fecharModal(); toast('Intervalo adicionado');
    if (PROJETO) await recarregarProjeto();
  } catch (e) { toast(e.message, 'err'); btnLoading('btn-add-int', false); }
}

// ── PAINEL DE SESSÕES (dentro da tarefa) ──
async function renderSessoesTarefa(tarefaId, containerEl) {
  limparTicksSessao(tarefaId);
  try {
    const sessoes = await req('GET', `/tarefas/${tarefaId}/tempo`);
    const totalEl = document.getElementById(`sess-total-${tarefaId}`);
    const ordenadas = [...sessoes].sort((a,b) => new Date(b.inicio.replace(' ','T')+'Z') - new Date(a.inicio.replace(' ','T')+'Z'));
    if (!sessoes.length) {
      if (totalEl) totalEl.textContent = '0.00 hr';
      containerEl.innerHTML = `<div class="sessoes-empty">Nenhuma sessão registrada.</div>`;
      return;
    }

    let totalH = 0;
    const html = ordenadas.map(s => {
      const ativa = !s.fim;
      totalH += parseFloat(s.horas_liquidas || 0);
      const duracaoSeg = ativa
        ? Math.floor((Date.now() - new Date(s.inicio.replace(' ','T')+'Z').getTime())/1000)
        : Math.round((parseFloat(s.horas_liquidas)||0) * 3600);

      const intervalosHtml = s.intervalos?.length ? `
        <div class="intervalos-list">
          ${s.intervalos.map(iv => {
            const dur = iv.fim
              ? Math.round((new Date(iv.fim.replace(' ','T')+'Z') - new Date(iv.inicio.replace(' ','T')+'Z'))/60000)
              : null;
            return `<div class="intervalo-item">
              <div class="intervalo-tipo">${esc(iv.tipo)}</div>
              <div class="intervalo-tempo">${fmtDatetime(iv.inicio)} → ${iv.fim ? fmtDatetime(iv.fim) : 'aberto'}</div>
              ${dur !== null ? `<div class="intervalo-duracao">${dur}min</div>` : ''}
              <button class="btn btn-danger btn-icon btn-sm" onclick="editarIntervalo('${iv.id}')" title="Editar"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 9.5V11h1.5l5.5-5.5-1.5-1.5L2 9.5zM10.85 2.65a1 1 0 0 0-1.42 0l-.79.79 1.42 1.42.79-.79a1 1 0 0 0 0-1.42z" fill="currentColor"/></svg></button>
              <button class="btn btn-danger btn-icon btn-sm" onclick="deletarIntervalo('${iv.id}','${tarefaId}')" title="Excluir"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 1.5l9 9M10.5 1.5l-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
            </div>`;
          }).join('')}
        </div>` : '';

      return `
        <div class="sessao-item ${ativa?'ativa':''}">
          <div class="sessao-header">
            <div class="sessao-main">
              <div class="sessao-user">${esc(s.usuario_nome||'—')}</div>
              <div class="sessao-tempo">${fmtDatetime(s.inicio)} → ${s.fim ? fmtDatetime(s.fim) : '<span class="inline-running">rodando</span>'}</div>
            </div>
            <div class="sessao-liquido" ${ativa ? `id="sdur-${s.id}"` : ''}>${fmtDuracao(duracaoSeg)}</div>
            <div class="sessao-actions">
              <button class="btn btn-ghost btn-icon btn-sm" onclick="editarSessao('${s.id}','${s.inicio}','${s.fim||''}')" title="Editar"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 9.5V11h1.5l5.5-5.5-1.5-1.5L2 9.5zM10.85 2.65a1 1 0 0 0-1.42 0l-.79.79 1.42 1.42.79-.79a1 1 0 0 0 0-1.42z" fill="currentColor"/></svg></button>
              <button class="btn btn-ghost btn-icon btn-sm" onclick="modalAdicionarIntervalo('${s.id}')" title="Adicionar intervalo"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 2v7M2 5.5h7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
              <button class="btn btn-danger btn-icon btn-sm" onclick="deletarSessao('${s.id}','${tarefaId}')" title="Excluir"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 1.5l9 9M10.5 1.5l-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
            </div>
          </div>
          ${intervalosHtml}
        </div>`;
    }).join('');

      if (totalEl) totalEl.textContent = fmtHoras(totalH);
      containerEl.innerHTML = html;

    // Atualizar sessões ativas
    const intervalIds = [];
    sessoes.filter(s => !s.fim).forEach(s => {
      const tickId = setInterval(() => {
        const el = document.getElementById('sdur-' + s.id);
        if (!el || !document.body.contains(el)) {
          clearInterval(tickId);
          return;
        }
        const seg = Math.floor((Date.now() - new Date(s.inicio.replace(' ','T')+'Z').getTime())/1000);
        el.textContent = fmtDuracao(seg);
      }, 1000);
      intervalIds.push(tickId);
    });
    if (intervalIds.length) SESSAO_TICKS.set(tarefaId, intervalIds);
  } catch (e) {
    containerEl.innerHTML = `<div class="text-danger text-sm">${esc(e.message)}</div>`;
  }
}

async function editarSessao(sessaoId, inicio, fim) {
  abrirModal(`
    <h2>Editar sessão</h2>
    <div class="form-row"><label>Início</label><input type="datetime-local" id="m-ini" value="${fmtDatetimeInput(inicio)}"></div>
    <div class="form-row"><label>Fim</label><input type="datetime-local" id="m-fim" value="${fmtDatetimeInput(fim)}"></div>
    <div class="modal-footer">
      <button class="btn" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-ed-sess" onclick="salvarSessao('${sessaoId}')">Salvar</button>
    </div>`);
}

async function salvarSessao(sessaoId) {
  const ini = gv('m-ini');
  const fimVal = gv('m-fim');
  if (fimVal && fimVal < ini) { toast('O horário de fim deve ser após o início', 'err'); return; }
  btnLoading('btn-ed-sess', true);
  try {
    const fim = fimVal ? fimVal.replace('T',' ') : null;
    await req('PUT', `/tempo/${sessaoId}`, { inicio: ini.replace('T',' '), fim });
    fecharModal(); toast('Sessão atualizada');
    RELATORIO_CACHE = null;
    if (PROJETO) await recarregarProjeto();
  } catch (e) { toast(e.message,'err'); btnLoading('btn-ed-sess', false); }
}

async function deletarSessao(sessaoId, tarefaId) {
  confirmar('Excluir esta sessão e todos os seus intervalos? Esta ação não pode ser desfeita.', async () => {
    try {
      await req('DELETE', `/tempo/${sessaoId}`);
      toast('Sessão excluída');
      if (PROJETO) await recarregarProjeto();
    } catch (e) { toast(e.message,'err'); }
  }, { titulo: 'Excluir sessão', btnTexto: 'Excluir', danger: true });
}

async function editarIntervalo(intervaloId) {
  abrirModal(`
    <h2>Editar intervalo</h2>
    <div class="form-row"><label>Tipo</label><input id="m-tipo" placeholder="Lanche, Reunião..."></div>
    <div class="form-grid">
      <div class="form-row"><label>Início</label><input type="datetime-local" id="m-ini"></div>
      <div class="form-row"><label>Fim</label><input type="datetime-local" id="m-fim"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-ed-int" onclick="salvarIntervalo('${intervaloId}')">Salvar</button>
    </div>`);
}

async function salvarIntervalo(id) {
  btnLoading('btn-ed-int', true);
  try {
    await req('PUT', `/intervalos/${id}`, { tipo: gv('m-tipo'), inicio: gv('m-ini').replace('T',' '), fim: gv('m-fim') ? gv('m-fim').replace('T',' ') : null });
    fecharModal(); toast('Intervalo atualizado');
    if (PROJETO) await recarregarProjeto();
  } catch (e) { toast(e.message,'err'); btnLoading('btn-ed-int', false); }
}

async function deletarIntervalo(id, tarefaId) {
  confirmar('Excluir este intervalo? Esta ação não pode ser desfeita.', async () => {
    try {
      await req('DELETE', `/intervalos/${id}`);
      toast('Intervalo excluído');
      if (PROJETO) await recarregarProjeto();
    } catch (e) { toast(e.message,'err'); }
  }, { titulo: 'Excluir intervalo', btnTexto: 'Excluir', danger: true });
}


// ── TEMA ──
function aplicarTema(tema) {
  document.documentElement.setAttribute('data-theme', tema);
  localStorage.setItem('ea_tema', tema);
  const btn = document.getElementById('icon-tema-svg');
  if (!btn) return;
  if (tema === 'dark') {
    btn.innerHTML = '<path d="M12.5 9.5A5.5 5.5 0 0 1 5.5 2.5a5.5 5.5 0 1 0 7 7z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>';
  } else {
    btn.innerHTML = '<circle cx="7.5" cy="7.5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M7.5 1v1.5M7.5 12v1.5M1 7.5h1.5M12 7.5h1.5M3.05 3.05l1.06 1.06M10.9 10.9l1.06 1.06M3.05 11.95l1.06-1.06M10.9 4.1l1.06-1.06" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>';
  }
}

function alternarTema() {
  const atual = document.documentElement.getAttribute('data-theme') || 'dark';
  aplicarTema(atual === 'dark' ? 'light' : 'dark');
}

// ── BREADCRUMB ──
function setBreadcrumb(partes) {
  // partes: [{label, onClick?}]  — último é "atual" sem click
  const el = document.getElementById('topbar-breadcrumb');
  if (!el) return;
  if (!partes.length) { el.innerHTML = ''; return; }
  el.innerHTML = partes.map((p, i) => {
    const isUltimo = i === partes.length - 1;
    const cls = isUltimo ? 'topbar-crumb atual' : 'topbar-crumb';
    const onclick = (!isUltimo && p.onClick) ? `onclick="${p.onClick}"` : '';
    const sep = i === 0 ? '<span class="topbar-sep-crumb">/</span>' : '';
    return `${sep}<span class="${cls}" ${onclick} title="${esc(p.label)}">${esc(p.label)}</span>${!isUltimo ? '<span class="topbar-sep-crumb">/</span>' : ''}`;
  }).join('');
}

window.addEventListener('load', async () => {
  // Aplicar tema salvo
  const temaSalvo = localStorage.getItem('ea_tema') || 'dark';
  aplicarTema(temaSalvo);
  await init();
  if (TOKEN) await carregarTimersAtivos();
  if (TOKEN) iniciarStatusPoll();
});

window.addEventListener('focus', () => {
  if (TOKEN) carregarStatus();
});

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && TOKEN) carregarStatus();
});
</script>
