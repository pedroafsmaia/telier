<!-- TOAST & MODAIS -->

<div id="timer-dock"></div>

<script>
// ── CONFIG ──
const API = 'https://telier-api.pedroafsmaia.workers.dev';
let TOKEN = localStorage.getItem('ea_token');
let EU = JSON.parse(localStorage.getItem('ea_user') || 'null');
let PROJETO = null;
let GRUPO_ATUAL = null;
let TAREFAS = [];
let USUARIOS = [];
let FILTRO_STATUS = 'todos';
let NEEDS_SETUP = false;
const ADMIN_MODE_KEY = 'ea_admin_mode';
let ADMIN_MODE = localStorage.getItem(ADMIN_MODE_KEY) || 'admin';
let ADMIN_TEMPO_FILTRO = { de: '', ate: '', usuario_id: '' };
let RELATORIO_CACHE = null; // { projetoId, ts, resumoMap }
let VISTA_ATUAL = 'dash';
let BUSCA_DASH = '';
let _projsDash = [];
let _ativasDash = [];
let _gruposDash = [];
let FILTRO_RESP_TAR = '';
let FILTRO_ORIGEM_TAREFAS = 'todos';
let FILTRO_STATUS_TAREFA = 'todos';
let TASK_MOBILE_FILTERS_OPEN = false;
let GRUPO_TASK_MOBILE_FILTERS_OPEN = false;
let TAREFAS_VIEW = 'kanban'; // 'kanban' | 'lista'
let LISTA_SORT = { col: null, dir: 'asc' };
let LISTA_CONCLUIDAS_EXPANDIDA = false;
let BUSCA_TAREFA = '';
let FILTRO_GRUPO_DASH = 'todos';
let COLEGAS_ATIVOS = [];
let PRESENCE_ABERTO = false;
let _presenceTick = null;
let _presenceHintShown = false;
let FILTRO_ORIGEM_DASH = 'todos';
let NOTIFS = [];
let _notifTick = null;
let _lastNotifSeen = 0;
let NOTIF_TAB = 'compartilhamentos';
const _prazoNotifShown = new Set();
const STARTDAY_COLLAPSE_KEY = 'telier_startday_collapsed';
const TIMER_AVISO_HORAS = 4;
const DASH_FILTERS_KEY = 'telier_dash_filters_v1';
const DASH_STATUS_OPCOES = new Set(['todos', 'Em andamento', 'A fazer', 'Em revisão', 'Pausado', 'Concluído', 'Arquivado']);
const REQ_TIMEOUT_MS = 15000;
const PROJ_CACHE_KEY = 'telier_proj_cache';
const PROJ_CACHE_TTL = 10000;
let _pendingUndoAction = null;
let FORCE_PASSWORD_CHANGE = false;

async function fetchProjetos(params) {
  try {
    const raw = sessionStorage.getItem(PROJ_CACHE_KEY);
    if (raw) {
      const { ts, data, key } = JSON.parse(raw);
      if (key === params.toString() && Date.now() - ts < PROJ_CACHE_TTL) return data;
    }
  } catch {}
  const data = await req('GET', `/projetos?${params}`);
  try {
    sessionStorage.setItem(PROJ_CACHE_KEY, JSON.stringify({
      ts: Date.now(), data, key: params.toString(),
    }));
  } catch {}
  return data;
}

function invalidarCacheProjetos() {
  sessionStorage.removeItem(PROJ_CACHE_KEY);
}

function carregarFiltrosDash() {
  try {
    const raw = localStorage.getItem(DASH_FILTERS_KEY);
    if (!raw) return;
    const f = JSON.parse(raw);
    if (typeof f?.busca === 'string') BUSCA_DASH = f.busca.slice(0, 120);
    if (typeof f?.grupo === 'string' && f.grupo) FILTRO_GRUPO_DASH = f.grupo;
    if (typeof f?.origem === 'string' && ['todos', 'meus', 'compartilhados'].includes(f.origem)) FILTRO_ORIGEM_DASH = f.origem;
    if (typeof f?.status === 'string' && DASH_STATUS_OPCOES.has(f.status)) FILTRO_STATUS = f.status;
  } catch {}
}

function salvarFiltrosDash() {
  try {
    localStorage.setItem(DASH_FILTERS_KEY, JSON.stringify({
      busca: BUSCA_DASH,
      grupo: FILTRO_GRUPO_DASH,
      origem: FILTRO_ORIGEM_DASH,
      status: FILTRO_STATUS,
    }));
  } catch {}
}

carregarFiltrosDash();

// ── API ──
async function req(method, path, body) {
  const ctrl = new AbortController();
  const timeoutId = setTimeout(() => ctrl.abort(), REQ_TIMEOUT_MS);
  let r;
  try {
    r = await fetch(API + path, {
      method,
      signal: ctrl.signal,
      headers: { 'Content-Type': 'application/json', ...(TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {}) },
      ...(body !== undefined ? { body: JSON.stringify(body) } : {}),
    });
  } catch (e) {
    if (e?.name === 'AbortError') {
      throw new Error('Tempo limite atingido ao conectar ao servidor.');
    }
    throw new Error('Falha de conexão com o servidor.');
  } finally {
    clearTimeout(timeoutId);
  }

  let d = null;
  try { d = await r.json(); } catch { d = null; }
  if (!r.ok) throw new Error(d?.error || `Erro na requisição (${r.status})`);
  return d;
}

// ── TOAST ──
let _toastTimer;
function toast(msg, tipo = 'ok') {
  const el = document.getElementById('toast');
  if (_pendingUndoAction?.timeout) clearTimeout(_pendingUndoAction.timeout);
  _pendingUndoAction = null;
  el.textContent = msg;
  el.className = tipo === 'err' ? 'toast-err' : '';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.add('hidden'), 3000);
}

function toastUndo(msg, onUndo, ttl = 5000) {
  const el = document.getElementById('toast');
  if (_pendingUndoAction?.timeout) clearTimeout(_pendingUndoAction.timeout);
  _pendingUndoAction = {
    onUndo,
    timeout: setTimeout(() => {
      _pendingUndoAction = null;
      el.classList.add('hidden');
    }, ttl),
  };

  el.className = '';
  el.innerHTML = `<span>${esc(msg)}</span><button class="toast-undo-btn" id="toast-undo-btn" type="button">Desfazer</button>`;
  const undoBtn = document.getElementById('toast-undo-btn');
  if (undoBtn) {
    undoBtn.onclick = () => {
      const atual = _pendingUndoAction;
      if (!atual) return;
      clearTimeout(atual.timeout);
      _pendingUndoAction = null;
      Promise.resolve(atual.onUndo()).catch(() => {});
      el.classList.add('hidden');
    };
  }
}

function atualizarBadgeNotificacoes(total) {
  const btn = document.getElementById('btn-notifs');
  const badge = document.getElementById('notif-badge');
  if (!btn || !badge) return;
  btn.style.display = TOKEN ? 'inline-flex' : 'none';
  const n = Number(total || 0);
  const txt = n > 99 ? '99+' : String(n);
  badge.textContent = txt;
  badge.classList.toggle('hidden', n <= 0);
}

function filtrarNotificacoesPainel(itens) {
  if (NOTIF_TAB === 'todas') return itens;
  if (NOTIF_TAB === 'prazos') {
    return itens.filter(n => n.tipo === 'timer_longo');
  }
  if (NOTIF_TAB === 'compartilhamentos') {
    return itens.filter(n => (n.tipo || '').includes('compartilhamento'));
  }
  return itens;
}

function renderPainelNotificacoes() {
  const panel = document.getElementById('notif-panel');
  if (!panel) return;
  const itens = filtrarNotificacoesPainel(NOTIFS || []);
  const lista = itens.map(n => {
    const dataFmt = new Date(String(n.criado_em || '').replace(' ', 'T') + 'Z').toLocaleString('pt-BR', {
      day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit',
    });
    const onOpen = n.escopo === 'projeto' && n.entidade_id
      ? `marcarNotifLida('${n.id}', () => { fecharPainelNotificacoes(); abrirProjeto('${n.entidade_id}'); })`
      : `marcarNotifLida('${n.id}')`;
    return `<div class="notif-item ${n.lida_em ? '' : 'nao-lida'}" onclick="${onOpen}">
      <div class="notif-title">${esc(n.titulo || 'Notificação')}</div>
      <div class="notif-meta">${esc(dataFmt)}${n.ator_nome ? ` · por ${esc(n.ator_nome)}` : ''}</div>
      ${n.mensagem ? `<div class="notif-msg">${esc(n.mensagem)}</div>` : ''}
    </div>`;
  }).join('') || '<div class="empty-state is-plain"><div class="empty-icon" aria-hidden="true"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></div><div class="empty-text">Tudo limpo por aqui</div><div class="empty-sub">Sem notificações nesta aba.</div></div>';

  panel.innerHTML = `
    <div class="notif-panel-head">
      <div class="notif-panel-title">Notificações</div>
      <button class="btn btn-ghost btn-sm" onclick="fecharPainelNotificacoes()">Fechar</button>
    </div>
    <div class="notif-tabs">
      <button class="notif-tab ${NOTIF_TAB==='compartilhamentos'?'ativo':''}" onclick="NOTIF_TAB='compartilhamentos';renderPainelNotificacoes()">Compartilhamentos</button>
      <button class="notif-tab ${NOTIF_TAB==='prazos'?'ativo':''}" onclick="NOTIF_TAB='prazos';renderPainelNotificacoes()">Alertas</button>
      <button class="notif-tab ${NOTIF_TAB==='todas'?'ativo':''}" onclick="NOTIF_TAB='todas';renderPainelNotificacoes()">Todas</button>
    </div>
    <div class="notif-panel-body">
      <div class="notif-list">${lista}</div>
    </div>
    <div class="notif-panel-footer">
      <button class="btn btn-ghost" onclick="carregarNotificacoes(true)">Atualizar</button>
      <button class="btn btn-primary" onclick="marcarTodasNotifLidas()">Marcar todas como lidas</button>
    </div>`;
}

async function carregarNotificacoes(silencioso = true) {
  if (!TOKEN) {
    NOTIFS = [];
    atualizarBadgeNotificacoes(0);
    return;
  }
  try {
    const data = await req('GET', '/notificacoes');
    const itens = Array.isArray(data?.itens) ? data.itens : [];
    const naoLidas = Number(data?.nao_lidas || 0);
    const novoMaisRecente = itens.length ? Date.parse(String(itens[0].criado_em || '').replace(' ', 'T') + 'Z') : 0;
    if (_lastNotifSeen && novoMaisRecente > _lastNotifSeen && !silencioso) {
      const ult = itens[0];
      if (ult?.titulo) toast(ult.titulo);
    }
    _lastNotifSeen = Math.max(_lastNotifSeen, Number.isFinite(novoMaisRecente) ? novoMaisRecente : 0);
    NOTIFS = itens;
    atualizarBadgeNotificacoes(naoLidas);
    if (document.getElementById('notif-panel')?.classList.contains('aberto')) {
      renderPainelNotificacoes();
    }
  } catch (e) {
    if (!silencioso) toast(e.message, 'err');
  }
}

function iniciarPollNotificacoes() {
  if (!TOKEN) return;
  if (_notifTick) clearInterval(_notifTick);
  req('POST', '/notificacoes/gerar-automaticas').catch(() => {});
  carregarNotificacoes(true);
  _notifTick = setInterval(() => {
    req('POST', '/notificacoes/gerar-automaticas').catch(() => {});
    carregarNotificacoes(false);
  }, 30000);
}

async function carregarStatus() {
  try {
    const data = await req('GET', '/status');
    COLEGAS_ATIVOS = Array.isArray(data.colegas_ativos) ? data.colegas_ativos : [];
    renderPresenceDock();
    atualizarBadgeNotificacoes(data.notifs_nao_lidas);
  } catch {}
}

function iniciarStatusPoll() {
  if (!TOKEN) return;
  if (window._statusTick) clearInterval(window._statusTick);
  carregarStatus();
  window._statusTick = setInterval(carregarStatus, 30000);
}

async function marcarNotifLida(id, abrirLink = null) {
  try {
    await req('PUT', `/notificacoes/${id}/lida`, {});
    await carregarNotificacoes(true);
    if (abrirLink) abrirLink();
  } catch (e) {
    toast(e.message, 'err');
  }
}

async function marcarTodasNotifLidas() {
  try {
    await req('PUT', '/notificacoes/lidas', {});
    await carregarNotificacoes(true);
    toast('Notificações marcadas como lidas');
    renderPainelNotificacoes();
  } catch (e) {
    toast(e.message, 'err');
  }
}

function abrirNotificacoes() {
  const panel = document.getElementById('notif-panel');
  const overlay = document.getElementById('notif-overlay');
  if (!panel || !overlay) return;
  panel.classList.add('aberto');
  panel.setAttribute('aria-hidden', 'false');
  overlay.classList.add('aberto');
  renderPainelNotificacoes();
}

function fecharPainelNotificacoes() {
  const panel = document.getElementById('notif-panel');
  const overlay = document.getElementById('notif-overlay');
  if (!panel || !overlay) return;
  panel.classList.remove('aberto');
  panel.setAttribute('aria-hidden', 'true');
  overlay.classList.remove('aberto');
}

function fecharOverlayModal(overlay) {
  if (!overlay) return;
  if (overlay._onKeydown) {
    document.removeEventListener('keydown', overlay._onKeydown);
    overlay._onKeydown = null;
  }
  overlay.remove();
}

// ── MODAL ──
function abrirModal(html, opts = {}) {
  const id = 'modal_' + Date.now();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = id;
  overlay.innerHTML = `<div class="modal ${opts.lg ? 'modal-lg' : ''}">${html}</div>`;
  if (!opts.locked) {
    overlay.addEventListener('click', e => { if (e.target === overlay) fecharOverlayModal(overlay); });
    const onKey = e => { if (e.key === 'Escape') fecharOverlayModal(overlay); };
    overlay._onKeydown = onKey;
    document.addEventListener('keydown', onKey);
  }
  document.getElementById('modais').appendChild(overlay);
  setTimeout(() => overlay.querySelector('input:not([type=date]):not([type=number])')?.focus(), 60);
  return overlay;
}

function confirmar(mensagem, onConfirm, opts = {}) {
  const titulo = opts.titulo || 'Confirmar';
  const btnTexto = opts.btnTexto || 'Confirmar';
  const btnCls = opts.danger ? 'btn-danger-solid' : 'btn-primary';
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal" style="max-width:400px">
    <h2 style="margin-bottom:10px">${esc(titulo)}</h2>
    <p class="modal-copy" style="margin-bottom:24px">${esc(mensagem)}</p>
    <div class="modal-footer">
      <button class="btn" id="confirm-cancel">Cancelar</button>
      <button class="btn ${btnCls}" id="confirm-ok">${esc(btnTexto)}</button>
    </div></div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) fecharOverlayModal(overlay); });
  const onKey = e => { if (e.key === 'Escape') fecharOverlayModal(overlay); };
  overlay._onKeydown = onKey;
  document.addEventListener('keydown', onKey);
  overlay.querySelector('#confirm-cancel').addEventListener('click', () => fecharOverlayModal(overlay));
  overlay.querySelector('#confirm-ok').addEventListener('click', () => { fecharOverlayModal(overlay); onConfirm(); });
  document.getElementById('modais').appendChild(overlay);
}
function fecharModal() { document.querySelectorAll('.modal-overlay').forEach(fecharOverlayModal); }

// ── UTILS ──
function isAdminRole() { return EU?.papel === 'admin'; }
function isAdmin() { return isAdminRole() && ADMIN_MODE === 'admin'; }
function souDono(donoId) { return EU?.id === donoId || isAdmin(); }
function podeEditar(proj) {
  if (!proj) return false;
  if (!isAdmin()) {
    const statusProj = normalizarStatusProjeto(proj.status);
    const statusGrupo = proj.grupo_status || null;
    if (statusProj === 'Arquivado') return false;
    if (statusGrupo === 'Arquivado') return false;
  }
  if (souDono(proj.dono_id)) return true;
  return (proj.editores || []).some(e => e.usuario_id === EU?.id);
}
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function iniciais(nome) { return (nome||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function avatarCor(nome) {
  const cores = ['#7c6af7','#4a9eff','#3ecf8e','#f5c542','#f0834a','#f25b5b'];
  let h = 0; for (const c of nome||'') h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return cores[Math.abs(h) % cores.length];
}
function avatar(nome, size = '') {
  const cor = avatarCor(nome);
  return `<div class="avatar ${size}" style="background:${cor}20;color:${cor}">${iniciais(nome)}</div>`;
}
function prazoFmt(prazo, curto = false) {
  if (!prazo) return null;
  const d = new Date(prazo + 'T00:00:00');
  if (curto) return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
}
function diasRestantes(prazo) {
  if (!prazo) return null;
  return Math.ceil((new Date(prazo + 'T00:00:00') - new Date()) / 86400000);
}
function btnLoading(id, on) {
  const b = document.getElementById(id);
  if (!b) return;
  b.disabled = on;
  b.classList.toggle('btn-loading', on);
}

// TAGS
const ST = { 'Arquivado':'tag-gray', 'Em andamento':'tag-blue','Concluída':'tag-green','Concluído':'tag-green','Bloqueada':'tag-red','A fazer':'tag-gray','Em revisão':'tag-yellow','Pausado':'tag-gray' };
const PT = { 'Alta':'tag-orange','Média':'tag-yellow','Baixa':'tag-green' };
const DT = { 'Simples':'tag-green','Moderada':'tag-yellow','Complexa':'tag-orange' };
const FT = { 'Estudo preliminar':'tag-purple','Anteprojeto':'tag-blue','Projeto básico':'tag-sky','Projeto executivo':'tag-cyan','Em obra':'tag-green' };
const PO = { 'Alta':0,'Média':1,'Baixa':2 };
const DO = { 'Complexa':0,'Moderada':1,'Simples':2 };

function tag(t, cls, lbl) { return `<span class="tag ${cls||ST[t]||'tag-gray'}"${lbl?' title="'+esc(lbl)+'"':''}>${esc(t)}</span>`; }
function normalizarStatusProjeto(status) {
  if (status === 'Concluída') return 'Concluído';
  if (status === 'Aguardando aprovação') return 'Em revisão'; // backward compat
  return status;
}
function projetoConcluido(status) {
  const s = normalizarStatusProjeto(status);
  return s === 'Concluído';
}

// ── INIT ──
async function init() {
  if (API === 'SUBSTITUA_PELA_URL_DO_SEU_WORKER') {
    document.getElementById('content').innerHTML = `<div class="api-empty"><div class="api-empty-icon"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3.5l9 15.5H3l9-15.5z" stroke="currentColor" stroke-width="1.7"/><path d="M12 9v5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><circle cx="12" cy="16.7" r="1" fill="currentColor"/></svg></div><div class="api-empty-text">Configure a URL do Worker em <code style="color:var(--red)">const API</code> no início do script.<br>Siga as instruções em <strong>INSTRUÇÕES.md</strong>.</div></div>`;
    document.getElementById('page-app').classList.remove('hidden');
    return;
  }
  try {
    // Setup de admin é opcional e não bloqueia cadastro/login de usuários.
    const setup = await req('GET', '/auth/needs-setup').catch(() => ({ needs_setup: false }));
    NEEDS_SETUP = !!setup.needs_setup;
    if (!TOKEN) { mostrar('login'); return; }
    EU = await req('GET', '/auth/me');
    FORCE_PASSWORD_CHANGE = Number(EU?.deve_trocar_senha || 0) === 1;
    localStorage.setItem('ea_user', JSON.stringify(EU));
    mostrar('app');
  } catch {
    TOKEN = null; localStorage.removeItem('ea_token'); localStorage.removeItem('ea_user');
    mostrar('login');
  }
}

function mostrar(tela) {
  window.scrollTo(0, 0);
  ['login','setup','app'].forEach(t => document.getElementById('page-' + t).classList.toggle('hidden', t !== tela));
  const setupBtn = document.getElementById('btn-admin-setup');
  const btnNotifs = document.getElementById('btn-notifs');
  if (setupBtn) setupBtn.style.display = (tela === 'login' && NEEDS_SETUP) ? 'inline-flex' : 'none';
  if (btnNotifs && tela !== 'app') btnNotifs.style.display = 'none';
  if (tela === 'app') {
    document.getElementById('topbar-nome').textContent = EU?.nome || '';
    atualizarBadgeNotificacoes(0);
    iniciarStatusPoll();
    syncAdminModeUI();
    renderDash();
    if (FORCE_PASSWORD_CHANGE) {
      setTimeout(() => modalTrocaSenhaObrigatoria(), 120);
    }
  }
}

function slideContent(direction) {
  const c = document.getElementById('content');
  if (!c) return;
  const x = direction === 'right' ? '28px' : '-28px';
  c.style.transition = 'none';
  c.style.transform = `translateX(${x})`;
  c.style.opacity = '0';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    c.style.transition = 'transform .26s cubic-bezier(.25,.46,.45,.94), opacity .2s ease';
    c.style.transform = 'translateX(0)';
    c.style.opacity = '1';
  }));
}

function syncAdminModeUI() {
  const btn = document.getElementById('btn-admin-toggle');
  if (!btn) return;
  if (!isAdminRole()) {
    btn.style.display = 'none';
    return;

  btn.style.display = 'inline-flex';

  btn.title = ADMIN_MODE === 'admin'

  syncAdminModeUI();

function eyeIconSvg(isVisible, size = 16, stroke = 1.6) {
  const slash = isVisible
    ? `<path d="M3 3l18 18" stroke="currentColor" stroke-width="${stroke}" stroke-linecap="round"/>`
    : '';
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="${stroke}"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="${stroke}"/>${slash}</svg>`;
}

function syncEyeButton(btn, isVisible) {
  if (!btn) return;
  const size = Number(btn.dataset.eyeSize || 16);
  const stroke = Number(btn.dataset.eyeStroke || 1.6);
  btn.innerHTML = eyeIconSvg(isVisible, size, stroke);
  btn.classList.toggle('is-visible', isVisible);
  const label = isVisible ? 'Ocultar senha' : 'Mostrar senha';
  btn.setAttribute('aria-label', label);
  btn.title = label;
}

function toggleSenhaLogin(btn) {
  const input = document.getElementById('l-senha');
  if (!input) return;
  const isVisible = input.type === 'password';
  input.type = isVisible ? 'text' : 'password';
  syncEyeButton(btn || document.getElementById('l-eye'), isVisible);
}

function toggleSenhaSetup(btn) {

function toggleSenhaReset(btn) {

async function fazerLogin() {
  const errEl = document.getElementById('login-err');
  errEl.classList.add('hidden');
  btnLoading('btn-login', true);
  try {
    const r = await req('POST', '/auth/login', {
      usuario_login: document.getElementById('l-login').value.trim(),
      senha: document.getElementById('l-senha').value,
    });
    TOKEN = r.token; EU = r.usuario; // r.usuario tem: id, nome, usuario_login, papel
    FORCE_PASSWORD_CHANGE = !!r.must_change_password || Number(r?.usuario?.deve_trocar_senha || 0) === 1;
    localStorage.setItem('ea_token', TOKEN);
    localStorage.setItem('ea_user', JSON.stringify(EU));
    if (!isAdminRole()) {
      ADMIN_MODE = 'normal';
      localStorage.setItem(ADMIN_MODE_KEY, ADMIN_MODE);
    }
    mostrar('app');
    carregarTimersAtivos();
    iniciarStatusPoll();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
    btnLoading('btn-login', false);
  }
}

async function salvarSenhaObrigatoria() {
  const atual = gv('m-senha-atual-obg');
  const nova = gv('m-senha-nova-obg');
  const nova2 = gv('m-senha-nova2-obg');
  if (!atual || !nova || !nova2) { toast('Preencha todos os campos', 'err'); return; }
  if (nova !== nova2) { toast('As novas senhas não coincidem', 'err'); return; }
  if (nova.length < 8) { toast('A nova senha deve ter no mínimo 8 caracteres', 'err'); return; }
  btnLoading('btn-salvar-senha-obg', true);
  try {
    await req('POST', '/auth/trocar-senha', { senha_atual: atual, nova_senha: nova });
    FORCE_PASSWORD_CHANGE = false;
    if (EU) {
      EU.deve_trocar_senha = 0;
      localStorage.setItem('ea_user', JSON.stringify(EU));
    }
    fecharModal();
    toast('Senha atualizada com sucesso');
  } catch (e) {
    toast(e.message, 'err');
    btnLoading('btn-salvar-senha-obg', false);
  }
}

  const nova = gv('m-reset-senha');

  if (!nova || nova.length < 8) { toast('Senha deve ter no mínimo 8 caracteres', 'err'); return; }
  btnLoading('btn-reset-senha', true);
  try {
    await req('PUT', `/usuarios/${usuarioId}/senha`, { nova_senha: nova, exigir_troca: exigir });
    fecharModal();
    toast('Senha redefinida com sucesso');
  } catch (e) {
    toast(e.message, 'err');
    btnLoading('btn-reset-senha', false);
  }
}

document.addEventListener('keydown', e => {
  if (FORCE_PASSWORD_CHANGE && !document.getElementById('page-app')?.classList.contains('hidden')) {
    return;
  }
  const emInput = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);

  if (e.key === 'Enter') {
    if (!document.getElementById('page-login').classList.contains('hidden')) fazerLogin();
    if (!document.getElementById('page-setup').classList.contains('hidden')) fazerSetup();
  }

  if (!emInput && !document.querySelector('.modal-overlay')) {
    // N — nova tarefa (dentro de projeto, aba Tarefas)
    if (e.key === 'n' || e.key === 'N') {
      const abaAtiva = document.querySelector('.aba.ativa')?.dataset.aba;
      if (PROJETO && document.getElementById('aba') &&
          (abaAtiva === 'tarefas' || abaAtiva === 'lista' || abaAtiva === 'kanban' || !abaAtiva)) {
        e.preventDefault();
        modalNovaTarefa(PROJETO.id);
      }
    }
    // P — novo projeto (no dashboard)
    if (e.key === 'p' || e.key === 'P') {
      if (!PROJETO && document.getElementById('cards-grid-dash')) {
        e.preventDefault();
        modalNovoProjeto();
      }
    }
    // / — focar busca no dashboard
    if (e.key === '/') {
      const busca = document.getElementById('busca-dash');
      if (busca) { e.preventDefault(); busca.focus(); busca.select(); }
    }
    // G — ir para dashboard
    if (e.key === 'g' || e.key === 'G') {
      if (PROJETO) { e.preventDefault(); renderDash(); }
    }
  }
});

async function fazerLogout() {
  const timersAtivos = Object.keys(TIMERS).length;
  if (timersAtivos > 0) {
    const plural = timersAtivos === 1 ? '1 cronômetro ativo' : `${timersAtivos} cronômetros ativos`;
    if (!confirm(`Você tem ${plural}. Os cronômetros continuarão rodando no servidor. Deseja sair mesmo assim?`)) return;
  }
  if (_presenceTick) clearInterval(_presenceTick);
  if (_notifTick) clearInterval(_notifTick);
  if (window._statusTick) clearInterval(window._statusTick);
  if (window._presenceDisplayTick) clearInterval(window._presenceDisplayTick);
  COLEGAS_ATIVOS = []; PRESENCE_ABERTO = false;
  NOTIFS = [];
  _lastNotifSeen = 0;
  atualizarBadgeNotificacoes(0);
  _presenceHintShown = false;
  const pd = document.getElementById('presence-dock');
  if (pd) pd.innerHTML = '';
  try { await req('POST', '/auth/logout'); } catch {}
  TOKEN = null; EU = null;
  FORCE_PASSWORD_CHANGE = false;
  localStorage.removeItem('ea_token'); localStorage.removeItem('ea_user');
  localStorage.removeItem(ADMIN_MODE_KEY);
  ADMIN_MODE = 'admin';
  mostrar('login');
}

function renderInicioDia(projetos, ativas, ultimaSessao = null, focoGlobal = null, resumoHoje = null) {
  const focoProjeto = projetos.find(p => p.minha_tarefa_foco);
  // Foco global tem precedencia sobre foco por projeto
  const focoNome = focoGlobal?.tarefa_nome || (focoProjeto ? focoProjeto.minha_tarefa_foco : null);
  const focoProjId = focoGlobal?.projeto_id || focoProjeto?.id;
  const focoProjNome = focoGlobal?.projeto_nome || (focoProjeto ? focoProjeto.nome : null);
  const urgentes = projetos.filter(p => {
    const dias = diasRestantes(p.prazo);
    return dias !== null && dias <= 7 && ![ 'Concluído', 'Arquivado' ].includes(normalizarStatusProjeto(p.status));
  }).sort((a, b) => (a.prazo || '9999-12-31').localeCompare(b.prazo || '9999-12-31'));
  const proximoUrgente = urgentes[0] || null;
  const ativo = ativas[0] || null;

  let tempoRodando = 'Sem cronômetros ativos';
  if (ativo?.inicio) {
    const seg = Math.floor((Date.now() - new Date(ativo.inicio.replace(' ', 'T') + 'Z').getTime()) / 1000);
    tempoRodando = `${fmtDuracao(seg)} rodando`;
  }

  const saved = localStorage.getItem(STARTDAY_COLLAPSE_KEY);
  const collapsed = saved === '1';

  return `
    <div class="startday-wrap ${collapsed ? 'collapsed' : ''}" id="startday-wrap">
      <div class="startday-head">
        <div class="startday-title">Começar meu dia</div>
        <button class="startday-toggle" onclick="toggleStartday()">${collapsed ? 'Expandir' : 'Recolher'}</button>
      </div>
      <div class="startday-grid">
        <div class="startday-card">
          <h4><svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="vertical-align:-2px;margin-right:4px"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>Foco atual</h4>
          <div class="startday-main">${focoNome ? esc(focoNome) : 'Nenhuma tarefa em foco'}</div>
          <div class="startday-sub">${focoNome
            ? `Projeto: ${esc(focoProjNome || '')}`
            : 'Abra um projeto, marque ★ em uma tarefa para definir foco'}</div>
          <div class="startday-actions">
            ${focoProjId
              ? `<button class="btn btn-sm btn-primary" onclick="abrirProjeto('${focoProjId}')">Retomar foco</button>`
              : `<button class="btn btn-sm" disabled>Retomar foco</button>`}
          </div>
        </div>

        <div class="startday-card">
          <h4><svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="vertical-align:-2px;margin-right:4px"><path d="M12 3.5l9 15.5H3l9-15.5z" stroke="currentColor" stroke-width="1.6"/><path d="M12 9v5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="16.7" r="1" fill="currentColor"/></svg>Pendências urgentes</h4>
          <div class="startday-main">${urgentes.length ? `${urgentes.length} projeto(s) com prazo até 7 dias` : 'Sem urgências por prazo'}</div>
          <div class="startday-sub">${proximoUrgente ? `${esc(proximoUrgente.nome)} · ${prazoFmt(proximoUrgente.prazo, true)}` : 'Tudo em dia por enquanto'}</div>
          <div class="startday-actions">
            ${proximoUrgente
              ? `<button class="btn btn-sm btn-primary" onclick="abrirProjeto('${proximoUrgente.id}')">Ver mais urgente</button>`
              : `<button class="btn btn-sm" disabled>Ver mais urgente</button>`}

        </div>

        <div class="startday-card">
          <h4><svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="vertical-align:-2px;margin-right:4px"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>Cronômetro</h4>

          <h4><svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="vertical-align:-2px;margin-right:4px"><path d="M12 8v8l4.5 2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.6"/></svg>Última sessão</h4>

          <div class="startday-sub">
            ${ultimaSessao
              ? `${esc(ultimaSessao.projeto_nome)} · ${ultimaSessao.horas}h`
              : 'Inicie seu primeiro cronômetro'}
          </div>
          <div class="startday-actions">
            ${ultimaSessao
              ? `<button class="btn btn-sm btn-primary"
                    onclick="abrirProjeto('${ultimaSessao.projeto_id}')">Retomar tarefa</button>`
                  : `<button class="btn btn-sm" disabled>Retomar tarefa</button>`}
          </div>
        </div>

        ${resumoHoje && Number(resumoHoje.horas_hoje || 0) > 0 ? `
        <div class="startday-card">
          <h4>Hoje</h4>
          <div class="startday-main">${parseFloat(resumoHoje.horas_hoje).toFixed(1)}h trabalhadas</div>
          <div class="startday-sub">${resumoHoje.tarefas} tarefa${resumoHoje.tarefas !== 1 ? 's' : ''} · ${resumoHoje.sessoes} sess${resumoHoje.sessoes !== 1 ? 'ões' : 'ão'}</div>
          <div class="startday-actions">
            <button class="btn btn-sm" onclick="abrirCentralAdmin('tempo')">Ver relatório</button>
          </div>
        </div>` : ''}
      </div>
    </div>`;
}

function toggleStartday() {
  const el = document.getElementById('startday-wrap');
  if (!el) return;
  el.classList.toggle('collapsed');
  const collapsed = el.classList.contains('collapsed');
  localStorage.setItem(STARTDAY_COLLAPSE_KEY, collapsed ? '1' : '0');
  const btn = el.querySelector('.startday-toggle');
  if (btn) btn.textContent = collapsed ? 'Expandir' : 'Recolher';
}

function renderDashLoadingState() {
  return `
    <div class="startday-wrap dash-header-spaced">
      <div class="startday-head">
        <div class="startday-title">Seu dia</div>
        <span class="skeleton-pill"></span>
      </div>
      <div class="startday-grid">
        ${'<div class="startday-card skeleton-card"></div>'.repeat(4)}
      </div>
    </div>
    <div class="dash-header dash-header-loading">
      <div class="dash-skeleton-line"></div>
    </div>
    <div class="dash-skeleton">${'<div class="dash-skeleton-card"></div>'.repeat(4)}</div>`;
}

function renderDashEmptyState(vazioTexto, opts = {}) {
  const titulo = opts.titulo || 'Sem projetos por aqui';
  const mostrarGuia = !!opts.mostrarGuia;
  return `<div class="empty-state"><div class="empty-icon" aria-hidden="true"><svg width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M3 18h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M7 18V9.5h4V18M13 18V6h4v12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M8 7.5l2-2 2 2M14 4l2-2 2 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="empty-text">${titulo}</div><div class="empty-sub">${vazioTexto}</div>${mostrarGuia ? `<div class="empty-guide"><div class="empty-guide-item">1. Crie um projeto.</div><div class="empty-guide-item">2. Abra o projeto e adicione a primeira tarefa.</div><div class="empty-guide-item">3. Defina prioridade e prazo para organizar o fluxo.</div><div class="empty-cta"><button class="btn btn-sm btn-primary" onclick="modalNovoProjeto()">+ Criar primeiro projeto</button></div></div>` : ''}</div>`;
}

function projetoArquivadoNoDash(proj) {
  if (!proj) return false;
  return normalizarStatusProjeto(proj.status) === 'Arquivado' || (proj.grupo_status || '') === 'Arquivado';
}

function grupoProgressToneClass(pctConcl, atrasados) {
  if (pctConcl === 100) return 'is-done';
  if (atrasados) return 'is-alert';
  return '';
}

function grupoStatusToneClass(status) {
  if (status === 'Pausado') return 'is-paused';
  if (status === 'Arquivado') return 'is-muted';
  if (status === 'Concluído') return 'is-done';
  return '';
}

// ── DASHBOARD ──
async function renderDash() {
  window.scrollTo(0, 0);
  PROJETO = null;
  FILTRO_RESP_TAR = '';
  BUSCA_TAREFA = '';
  FILTRO_ORIGEM_TAREFAS = 'todos';
  FILTRO_STATUS_TAREFA = 'todos';
  document.title = 'Telier';
  setBreadcrumb([]);
  const c = document.getElementById('content');
  c.innerHTML = renderDashLoadingState();
  try {
    const params = new URLSearchParams();
    if (FILTRO_STATUS !== 'todos') params.set('status', FILTRO_STATUS);
    if (isAdminRole() && ADMIN_MODE === 'normal') params.set('as_member', '1');
    const qs = params.toString() ? `?${params.toString()}` : '';
    const [projetos, ativas, grupos, ultimaSessao, resumoHoje, focoGlobal] = await Promise.all([
      fetchProjetos(params),
      req('GET', `/tempo/ativas${isAdminRole() && ADMIN_MODE === 'normal' ? '?as_member=1' : ''}`).catch(() => []),
      req('GET', `/grupos${isAdminRole() && ADMIN_MODE === 'normal' ? '?as_member=1' : ''}`).catch(() => []),
      req('GET', '/tempo/ultima-sessao').catch(() => null),
      req('GET', '/tempo/resumo-hoje').catch(() => null),
      req('GET', '/auth/foco-global').catch(() => null),
    ]);

    _projsDash = projetos;
    _ativasDash = ativas;
    _gruposDash = grupos;
    projetos.forEach(p => {
      if (_prazoNotifShown.has(p.id)) return;
      const dias = diasRestantes(p.prazo);
      if (dias !== null && dias >= 0 && dias <= 3 && !projetoConcluido(p.status) && p.dono_id === EU?.id) {
        _prazoNotifShown.add(p.id);
        const msg = dias === 0
          ? `"${p.nome}" vence hoje.`
          : `"${p.nome}" vence em ${dias} dia${dias === 1 ? '' : 's'}.`;
        toast(`Prazo próximo: ${msg}`, 'ok');
      }
    });
    const projetosAtivos = projetos.filter(p => !projetoArquivadoNoDash(p));
    const projetosArquivados = projetos.filter(p => projetoArquivadoNoDash(p));
    const projetosVisiveisBase = FILTRO_STATUS === 'Arquivado' ? projetosArquivados : projetosAtivos;
    const gruposVisiveisBase = (grupos || []).filter(g => FILTRO_STATUS === 'Arquivado'
      ? (g.status || 'Ativo') === 'Arquivado'
      : (g.status || 'Ativo') !== 'Arquivado');
    const compartilhados = projetosVisiveisBase.filter(p => Number(p.compartilhado_comigo) === 1);
    const emAndamento = projetosAtivos.filter(p => !['Concluído'].includes(normalizarStatusProjeto(p.status))).length;
    const meus = projetosVisiveisBase.filter(p => Number(p.compartilhado_comigo) !== 1).length;
    const filtros = ['todos','Em andamento','A fazer','Em revisão','Pausado','Concluído','Arquivado'];
    const statusCountMap = Object.fromEntries(filtros.map(f => [f,
      f === 'todos'
        ? projetosVisiveisBase.length
        : (f === 'Arquivado'
          ? projetosArquivados.length
          : projetosAtivos.filter(p => normalizarStatusProjeto(p.status) === f).length)
    ]));

    let html = `
      ${renderInicioDia(projetos, ativas, ultimaSessao, focoGlobal, resumoHoje)}
      <div class="dash-header dash-header-spaced">
        <div>
          <div class="dash-title">Projetos</div>
        </div>
        <div class="dash-actions">
          ${isAdmin() ? `<button class="btn" onclick="abrirCentralAdmin()">Central admin</button>` : ''}
          ${isAdmin() ? `<button class="btn" onclick="modalNovoColega()">Cadastrar admin</button>` : ''}
          <button class="btn" onclick="modalNovoGrupo()">+ Grupo</button>
          <button class="btn btn-primary" onclick="modalNovoProjeto()">+ Novo projeto</button>
        </div>
      </div>
      ${compartilhados.length ? `<div class="share-hint"><strong>${compartilhados.length}</strong> projeto${compartilhados.length===1?'':'s'} compartilhado${compartilhados.length===1?'':'s'} com você no momento.</div>` : ''}
      <div class="dash-toolbar">
        <div class="dash-toolbar-row">
          <input type="search" class="search-dash" id="busca-dash" placeholder="Buscar projeto..." value="${esc(BUSCA_DASH)}" oninput="filtrarProjetosBusca(this.value)">
          <div class="segmented">
            <button class="segmented-btn ${FILTRO_ORIGEM_DASH==='todos'?'ativo':''}" data-origem="todos" onclick="filtrarOrigemDash('todos')">Todos${projetosVisiveisBase.length > 0 ? `<span class="seg-count">${projetosVisiveisBase.length}</span>` : ''}</button>
            <button class="segmented-btn ${FILTRO_ORIGEM_DASH==='meus'?'ativo':''}" data-origem="meus" onclick="filtrarOrigemDash('meus')">Meus${meus > 0 ? `<span class="seg-count">${meus}</span>` : ''}</button>
            <button class="segmented-btn ${FILTRO_ORIGEM_DASH==='compartilhados'?'ativo':''}" data-origem="compartilhados" onclick="filtrarOrigemDash('compartilhados')">Compartilhados${compartilhados.length > 0 ? `<span class="seg-count">${compartilhados.length}</span>` : ''}</button>
          </div>
        </div>
        <div class="dash-toolbar-row">
          <select class="resp-filter select-control flex-shrink-0" onchange="filtrarGrupoDash(this.value)">
            <option value="todos" ${FILTRO_GRUPO_DASH==='todos'?'selected':''}>Todos os grupos</option>
            <option value="sem" ${FILTRO_GRUPO_DASH==='sem'?'selected':''}>Sem grupo</option>
            ${gruposVisiveisBase.map(g => `<option value="${g.id}" ${FILTRO_GRUPO_DASH===g.id?'selected':''}>${esc(g.nome)}</option>`).join('')}
          </select>
          <div class="toolbar-sep"></div>
          ${filtros.map(f => { const label = { 'todos':'Todos' }[f] || f; const cnt = statusCountMap[f] || 0; return `<button class="filter-btn ${FILTRO_STATUS===f?'ativo':''}" onclick="setFiltro('${esc(f)}')">${label}${cnt > 0 ? `<span class="seg-count">${cnt}</span>` : ''}</button>`; }).join('')}
        </div>
      </div>
      <div id="cards-grid-dash">`;

    html += renderProjetosDash(projetosVisiveisBase, gruposVisiveisBase) + '</div>';
    const slide = VISTA_ATUAL === 'projeto';
    VISTA_ATUAL = 'dash';
    c.innerHTML = html;
    if (slide) slideContent('left');
  } catch (e) {
    c.innerHTML = `<div class="error-block">${esc(e.message)}<div class="muted-detail"><button class="btn btn-sm" onclick="renderDash()">Tentar novamente</button></div></div>`;
  }
}

function renderProjetosDash(projetos, grupos) {
  const busca = BUSCA_DASH.toLowerCase().trim();
  let lista = busca ? projetos.filter(p => p.nome.toLowerCase().includes(busca)) : projetos;
  if (FILTRO_ORIGEM_DASH === 'meus') lista = lista.filter(p => Number(p.compartilhado_comigo) !== 1);
  else if (FILTRO_ORIGEM_DASH === 'compartilhados') lista = lista.filter(p => Number(p.compartilhado_comigo) === 1);
  if (FILTRO_GRUPO_DASH === 'sem') lista = lista.filter(p => !p.grupo_id);
  else if (FILTRO_GRUPO_DASH !== 'todos') {
    const filtered = lista.filter(p => String(p.grupo_id) === String(FILTRO_GRUPO_DASH));
    if (filtered.length === 0 && lista.length > 0) { FILTRO_GRUPO_DASH = 'todos'; salvarFiltrosDash(); }
    else lista = filtered;
  }
  if (!lista.length) {
    const vazioInicial = !busca && FILTRO_STATUS === 'todos' && FILTRO_GRUPO_DASH === 'todos' && FILTRO_ORIGEM_DASH === 'todos';
    const vazioTexto = FILTRO_ORIGEM_DASH === 'compartilhados'
      ? 'Nenhum projeto compartilhado com você no contexto atual.'
      : (busca ? 'Tente outro termo de busca' : FILTRO_STATUS !== 'todos' ? 'Tente outro filtro' : 'Comece criando seu primeiro projeto.');
    const titulo = FILTRO_ORIGEM_DASH === 'compartilhados' ? 'Sem compartilhamentos no momento' : 'Sem projetos por aqui';
    return renderDashEmptyState(vazioTexto, { titulo, mostrarGuia: vazioInicial });
  }

  const collapsed = JSON.parse(localStorage.getItem('telier_grupos_collapsed') || '[]');
  const isCollapsed = id => collapsed.includes(id);
  const hoje = new Date();
  hoje.setHours(0, 0, 0, 0);

  function calcGrupoKpis(items) {
    return items.reduce((acc, projeto) => {
      const status = projeto.status || '';
      const prazo = projeto.prazo ? new Date(`${projeto.prazo}T00:00:00`) : null;
      if (prazo) prazo.setHours(0, 0, 0, 0);
      acc.area += Number(projeto.area_m2 || 0);
      acc.horas += Number(projeto.total_horas || 0);
      if (status === 'Concluído') acc.concluidos += 1;
      if (status === 'Em andamento' || status === 'Em revisão') acc.ativos += 1;
      if (prazo && prazo < hoje && status !== 'Concluído' && status !== 'Arquivado') acc.atrasados += 1;
      return acc;
    }, { area: 0, horas: 0, concluidos: 0, atrasados: 0, ativos: 0 });
  }

  let html = '';

  const compartilhados = lista.filter(p => Number(p.compartilhado_comigo) === 1);
  let listaAgrupada = lista;
  if (FILTRO_ORIGEM_DASH === 'todos' && compartilhados.length) {
    html += `<div class="shared-spotlight">
      <div class="dash-section-title"><h3>Compartilhados comigo</h3><span class="dash-section-note">Acesso direto ou herdado por grupo</span></div>
      <div class="cards-grid">${renderCardsDash(compartilhados)}</div>
    </div>`;
    listaAgrupada = lista.filter(p => Number(p.compartilhado_comigo) !== 1);
    if (listaAgrupada.length) {
      html += `<div class="dash-section-title"><h3>Meus projetos (organizados por grupo)</h3><span class="dash-section-note">Projetos sob sua propriedade ou gestão direta</span></div>`;
    }
  }

  const temGrupos = (grupos || []).length > 0;

  // Render all groups (including empty ones as drop zones)
  for (const grupo of (grupos || [])) {
    const gprojetos = listaAgrupada.filter(p => String(p.grupo_id) === String(grupo.id));
    const col = isCollapsed(grupo.id);
    const kpis = calcGrupoKpis(gprojetos);
    const areaGrupo = kpis.area;
    const horasGrupo = kpis.horas;
    const concluidos = kpis.concluidos;
    const atrasados = kpis.atrasados;
    const ativos = kpis.ativos;
    const pctConcl = gprojetos.length ? Math.round((concluidos / gprojetos.length) * 100) : 0;
    const grupoStatus = grupo.status || 'Ativo';
    const grupoArquivado = grupoStatus === 'Arquivado';
    const progressColor = pctConcl === 100 ? 'var(--green)' : 'var(--blue)';
    html += `
      <div class="grupo-section ${grupoArquivado ? 'is-archived' : ''}" id="gs-${grupo.id}"
        draggable="true"
        ondragstart="dragGrupo(event,'${grupo.id}')"
        ondragend="dragGrupoEnd(event)"
        ondragover="dragOver(event,'${grupo.id}')"
        ondragleave="dragLeave(event)"
        ondrop="dropProjeto(event,'${grupo.id}')">
        <div class="grupo-card" data-status="${esc(grupoStatus)}">
          <div class="grupo-card-header">
            <span class="grupo-toggle ${col ? 'collapsed' : ''}" onclick="toggleGrupo('${grupo.id}')" title="${col ? 'Expandir' : 'Recolher'}">▼</span>
            <div class="grupo-title-area">
              <span class="grupo-nome">${esc(grupo.nome)}</span>
            </div>
            <div class="grupo-props">
              <div class="grupo-prop">
                <span class="grupo-prop-val">${gprojetos.length}</span>
                <span class="grupo-prop-lbl">Projetos</span>
              </div>
              ${areaGrupo > 0 ? `<div class="grupo-prop"><span class="grupo-prop-val">${areaGrupo.toLocaleString('pt-BR',{maximumFractionDigits:0})} m²</span><span class="grupo-prop-lbl">Área</span></div>` : ''}
              ${horasGrupo > 0 ? `<div class="grupo-prop"><span class="grupo-prop-val">${fmtHoras(horasGrupo)}</span><span class="grupo-prop-lbl">Horas</span></div>` : ''}
              <div class="grupo-prop">
                <span class="grupo-prop-val ${grupoProgressToneClass(pctConcl, atrasados)}">${pctConcl}%</span>
                <span class="grupo-prop-lbl">${atrasados ? `⚠ ${atrasados}d atr.` : 'Progresso'}</span>
              </div>
              ${grupo.status && grupo.status !== 'Ativo' ? `<div class="grupo-prop"><span class="grupo-prop-val ${grupoStatusToneClass(grupo.status)}">${esc(grupo.status)}</span><span class="grupo-prop-lbl">Status</span></div>` : ''}
            </div>
            <div class="grupo-actions" onclick="event.stopPropagation()">
              <button class="btn btn-primary btn-sm" onclick="abrirGrupo('${grupo.id}')">Abrir</button>
              <button class="btn btn-ghost btn-sm" onclick="compartilharGrupo('${grupo.id}')">Compartilhar</button>
              <button class="btn btn-ghost btn-icon btn-sm" onclick="modalEditarGrupo('${grupo.id}')" title="Configurações do grupo"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 9.5V11h1.5l5.5-5.5-1.5-1.5L2 9.5zM10.85 2.65a1 1 0 0 0-1.42 0l-.79.79 1.42 1.42.79-.79a1 1 0 0 0 0-1.42z" fill="currentColor"/></svg></button>
            </div>
          </div>
          ${!col && gprojetos.length > 0 ? `
          <div class="grupo-card-prog">
            <div class="grupo-card-prog-fill" style="width:${pctConcl}%;background:${progressColor}"></div>
          </div>` : ''}
          ${col ? '' : `
          <div class="grupo-card-body">
            <div class="grupo-drop-indicator tight">Solte para mover para ${esc(grupo.nome)}</div>
            ${gprojetos.length
              ? `<div class="grupo-content-shell"><div class="grupo-project-grid">${renderCardsDash(gprojetos)}</div></div>`
              : `<div class="grupo-empty-zone with-action"><span class="grupo-drop-hint">Arraste projetos aqui</span><button class="btn btn-sm" onclick="event.stopPropagation();modalNovoProjeto('${grupo.id}')">+ Criar projeto neste grupo</button></div>`}
          </div>`}
        </div>
      </div>`;
  }

  // Ungrouped projects (also a drop zone when groups exist)
  const grupoIds = new Set((grupos || []).map(g => String(g.id)));
  const semGrupo = listaAgrupada.filter(p => !p.grupo_id || !grupoIds.has(String(p.grupo_id)));
  if (semGrupo.length || temGrupos) {
    if (temGrupos) {
      html += `<div class="grupo-section sem-grupo"
        ondragover="dragOver(event,null)"
        ondragleave="dragLeave(event)"
        ondrop="dropProjeto(event,null)">
        <div class="grupo-sem-label">Sem grupo</div>
        <div class="grupo-drop-indicator">Solte para remover do grupo</div>
        ${semGrupo.length
          ? `<div class="cards-grid">${renderCardsDash(semGrupo)}</div>`
          : `<div class="grupo-empty-zone"><span class="grupo-drop-hint">Arraste projetos aqui para desagrupar</span></div>`}
      </div>`;
    } else {
      html += `<div class="cards-grid">${renderCardsDash(semGrupo)}</div>`;
    }
  }

  return html || renderDashEmptyState('Crie um projeto para começar a organizar tarefas e prazo.', { mostrarGuia: false });
}

function renderCardsDash(projetos) {
  return projetos.map(p => {
    const statusProjeto = normalizarStatusProjeto(p.status);
    const total = parseInt(p.total_tarefas) || 0;
    const conc = parseInt(p.tarefas_concluidas) || 0;
    const pct = total ? Math.round(conc / total * 100) : 0;
    const dias = diasRestantes(p.prazo);
    const urgente = dias !== null && dias <= 7 && !projetoConcluido(statusProjeto);
    const timerAtivo = _ativasDash && _ativasDash.some(a => a.projeto_id === p.id);
    const compartilhado = Number(p.compartilhado_comigo) === 1;
    const origem = p.origem_compartilhamento === 'grupo' ? 'via grupo' : p.origem_compartilhamento === 'manual' ? 'direto' : '';
    const podeCompartilhar = souDono(p.dono_id);
    return `
      <div class="proj-card ${compartilhado ? 'shared' : ''}" data-status="${esc(statusProjeto)}"
        draggable="true"
        ondragstart="dragProjeto(event,'${p.id}')"
        ondragend="dragProjetoEnd(event)"
        onclick="if(!_dragJustEnded)abrirProjeto('${p.id}')">
        <div class="proj-card-header">
          <div class="proj-card-nome">${esc(p.nome)}</div>
          ${souDono(p.dono_id) ? `<button class="btn btn-ghost btn-icon btn-sm proj-card-edit" onclick="event.stopPropagation();modalEditarProjeto('${p.id}')" title="Editar"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 9.5V11h1.5l5.5-5.5-1.5-1.5L2 9.5zM10.85 2.65a1 1 0 0 0-1.42 0l-.79.79 1.42 1.42.79-.79a1 1 0 0 0 0-1.42z" fill="currentColor"/></svg></button>` : ''}
        </div>
        <div class="card-meta">
          ${compartilhado ? `<div class="card-meta-item"><span class="card-meta-label">Compartilhamento</span><span class="tag tag-cyan">Compartilhado ${origem ? `· ${origem}` : ''}</span></div>` : ''}
          <div class="card-meta-item"><span class="card-meta-label">Fase</span>${tag(p.fase, FT[p.fase])}</div>
          <div class="card-meta-item"><span class="card-meta-label">Status</span>${tag(statusProjeto)}</div>
          <div class="card-meta-item"><span class="card-meta-label">Prioridade</span>${tag(p.prioridade, PT[p.prioridade])}</div>
          ${p.prazo ? `<div class="card-meta-item"><span class="card-meta-label">Prazo</span><span class="tag ${urgente?'tag-red':'tag-gray'} mono">${prazoFmt(p.prazo, true)}</span></div>` : ''}
          ${p.area_m2 ? `<div class="card-meta-item"><span class="card-meta-label">Área</span><span class="tag tag-gray mono">${p.area_m2.toLocaleString('pt-BR')} m²</span></div>` : ''}
          ${timerAtivo ? `<div class="card-meta-item"><span class="card-meta-label">Ativo</span><span class="tag tag-green status-badge-inline"><span class="status-dot-live">●</span> Em progresso</span></div>` : ''}
        </div>
        ${total ? `
        <div class="proj-card-progress">
          <div class="proj-progress-nums">${conc}/${total} tarefas · ${pct}%</div>
          <div class="proj-progress-bar"><div class="proj-progress-fill ${pct===100?'done':'partial'}" style="width:${pct}%"></div></div>
        </div>` : ''}
        <div class="proj-card-footer">

// ── DRAG & DROP DE PROJETOS ──
let _dragProjetoId = null;
let _dragJustEnded = false;
let _dragGrupoId = null;
let _dragPreviewEl = null;

function limparDragPreview() {
  if (_dragPreviewEl?.parentNode) _dragPreviewEl.parentNode.removeChild(_dragPreviewEl);
  _dragPreviewEl = null;
}

function criarDragPreview(el, e) {
  limparDragPreview();
  if (!el || !e?.dataTransfer) return;
  const clone = el.cloneNode(true);
  clone.classList.remove('dragging');
  clone.classList.add('drag-preview');
  clone.style.width = `${el.offsetWidth}px`;
  clone.style.opacity = '1';
  clone.style.transform = 'none';
  clone.style.filter = 'none';
  document.body.appendChild(clone);
  _dragPreviewEl = clone;
  try { e.dataTransfer.setDragImage(clone, 28, 20); } catch {}
}

function dragProjeto(e, projetoId) {
  e.stopPropagation();
  _dragProjetoId = projetoId;
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', projetoId); } catch {}
  const card = e.target.closest('.proj-card');
  criarDragPreview(card, e);
  setTimeout(() => card?.classList.add('dragging'), 0);
}

function dragProjetoEnd(e) {
  _dragJustEnded = true;
  setTimeout(() => { _dragJustEnded = false; }, 80);
  _dragProjetoId = null;
  limparDragPreview();
  document.querySelectorAll('.proj-card.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.grupo-section.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function dragGrupo(e, grupoId) {
  e.stopPropagation();
  _dragGrupoId = grupoId;
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', grupoId); } catch {}
  setTimeout(() => e.target.closest('.grupo-section')?.classList.add('dragging'), 0);
}

function dragGrupoEnd(e) {
  _dragGrupoId = null;
  document.querySelectorAll('.grupo-section.dragging').forEach(el => el.classList.remove('dragging'));
}

function dragOver(e, grupoId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function dragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

async function dropProjeto(e, grupoId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (_dragGrupoId && _dragGrupoId !== grupoId) {
    try {
      const idxAlvo = _gruposDash.findIndex(g => g.id === grupoId);
      const idxOrig = _gruposDash.findIndex(g => g.id === _dragGrupoId);
      if (idxAlvo >= 0 && idxOrig >= 0) {
        const nova = [..._gruposDash];
        const [movido] = nova.splice(idxOrig, 1);
        nova.splice(idxAlvo, 0, movido);
        _gruposDash = nova;
        await Promise.all(_gruposDash.map((g, i) => req('PATCH', `/grupos/${g.id}`, { ordem: i + 1 })));
        const grid2 = document.getElementById('cards-grid-dash');
        if (grid2) grid2.innerHTML = renderProjetosDash(_projsDash, _gruposDash);
        toast('Ordem dos grupos atualizada');
      }
    } catch (err) {
      toast(err.message, 'err');
    } finally {
      _dragGrupoId = null;
    }
    return;
  }

  const projetoId = _dragProjetoId;
  if (!projetoId) return;
  const proj = _projsDash.find(p => p.id === projetoId);
  if (!proj) return;
  const grupoAtual = proj.grupo_id || null;
  const grupoAlvo = grupoId || null;
  if (grupoAtual === grupoAlvo) return;
  try {
    await req('PATCH', `/projetos/${projetoId}`, { grupo_id: grupoAlvo });
    invalidarCacheProjetos();
    _projsDash = _projsDash.map(p => p.id === projetoId ? { ...p, grupo_id: grupoAlvo } : p);
    // Reset group filter if it was showing the origin group and project moved out
    if (FILTRO_GRUPO_DASH === grupoAtual && grupoAlvo !== grupoAtual) {
      FILTRO_GRUPO_DASH = 'todos';
      salvarFiltrosDash();
    }
    const grid = document.getElementById('cards-grid-dash');
    if (grid) grid.innerHTML = renderProjetosDash(_projsDash, _gruposDash);
    const nomeGrupo = grupoAlvo ? (_gruposDash.find(g => g.id === grupoAlvo)?.nome || 'grupo') : null;
    const grupoAnterior = grupoAtual;
    const grupoNovo = grupoAlvo;
    toastUndo(nomeGrupo ? `Movido para "${nomeGrupo}"` : 'Removido do grupo', async () => {
      try {
        await req('PATCH', `/projetos/${projetoId}`, { grupo_id: grupoAnterior });
        _projsDash = _projsDash.map(p => p.id === projetoId ? { ...p, grupo_id: grupoAnterior } : p);
        const gridUndo = document.getElementById('cards-grid-dash');
        if (gridUndo) gridUndo.innerHTML = renderProjetosDash(_projsDash, _gruposDash);
        const nomeAnterior = grupoAnterior ? (_gruposDash.find(g => g.id === grupoAnterior)?.nome || 'grupo') : 'sem grupo';
        toast(`Movimento desfeito (${nomeAnterior})`);
      } catch (e) {
        _projsDash = _projsDash.map(p => p.id === projetoId ? { ...p, grupo_id: grupoNovo } : p);
        toast(e.message || 'Não foi possível desfazer', 'err');
      }
    }, 5500);
  } catch (err) { toast(err.message, 'err'); }
  finally { _dragProjetoId = null; }
}

function tempoDesde(inicio) {
  if (!inicio) return '—';
  const seg = Math.max(0, Math.floor((Date.now() - new Date(inicio.replace(' ', 'T') + 'Z').getTime()) / 1000));
  return fmtDuracao(seg);
}

async function renderTimelineHoje(el) {
  el.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  try {
    const rows = await req('GET', '/admin/timeline-hoje');
    if (!rows.length) {
      el.innerHTML = `<div style="color:var(--text3);padding:16px">Sem sessões registradas hoje.</div>`;
      return;
    }
    const START = 480, RANGE = 720;
    const byUser = {};
    rows.forEach(r => {
      (byUser[r.usuario_id] = byUser[r.usuario_id] || { nome: r.usuario_nome, sessions: [] })
        .sessions.push(r);
    });
    const rowsHtml = Object.values(byUser).map(u => {
      const blocks = u.sessions.map(s => {
        const startMin = new Date(s.inicio.replace(' ', 'T') + 'Z').getHours() * 60
                        + new Date(s.inicio.replace(' ', 'T') + 'Z').getMinutes();
        const endMin   = s.fim
          ? new Date(s.fim.replace(' ', 'T') + 'Z').getHours() * 60
            + new Date(s.fim.replace(' ', 'T') + 'Z').getMinutes()
          : (new Date().getHours() * 60 + new Date().getMinutes());
        const left  = Math.max(0, Math.min(100, (startMin - START) / RANGE * 100));
        const width = Math.max(0.5, Math.min(100 - left, (endMin - startMin) / RANGE * 100));
        return `<div class="tl-block" style="left:${left}%;width:${width}%;
          background:${s.fim ? 'var(--accent)' : 'var(--green)'};opacity:.8"
          title="${esc(s.tarefa_nome)}"></div>`;
      }).join('');
      const totalH = (u.sessions.reduce((sum, s) => {
        const dur = s.fim
          ? (new Date(s.fim.replace(' ','T') + 'Z') - new Date(s.inicio.replace(' ','T') + 'Z')) / 3600000
          : (Date.now() - new Date(s.inicio.replace(' ','T') + 'Z')) / 3600000;
        return sum + dur;
      }, 0)).toFixed(1);
      return `<div class="tl-row">
        <div class="tl-name">${esc(u.nome)}</div>
        <div class="tl-track">${blocks}</div>
        <div class="tl-hours">${fmtHoras(parseFloat(totalH))}</div>
      </div>`;
    }).join('');
    const axis = ['08h','10h','12h','14h','16h','18h','20h']
      .map(h => `<span>${h}</span>`).join('');
    el.innerHTML = `
      <div class="timeline-wrap">${rowsHtml}</div>
      <div class="tl-axis">${axis}</div>`;
  } catch (err) {
    el.innerHTML = `<div class="error-block">${esc(err.message)}</div>`;
  }
}

function csvEsc(v) {
  const s = String(v ?? '');
  if (/[",\n;]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

async function exportarTempoAdminCSV() {
  try {
    const q = new URLSearchParams();
    if (ADMIN_TEMPO_FILTRO.de) q.set('de', ADMIN_TEMPO_FILTRO.de);
    if (ADMIN_TEMPO_FILTRO.ate) q.set('ate', ADMIN_TEMPO_FILTRO.ate);
    if (ADMIN_TEMPO_FILTRO.usuario_id) q.set('usuario_id', ADMIN_TEMPO_FILTRO.usuario_id);
    const linhas = await req('GET', `/admin/tempo${q.toString() ? `?${q.toString()}` : ''}`);
    const header = ['usuario_nome', 'projeto_nome', 'tarefa_nome', 'horas_liquidas'];
    const out = [header.join(';')];
    linhas.forEach(l => {
      out.push([
        csvEsc(l.usuario_nome),
        csvEsc(l.projeto_nome),
        csvEsc(l.tarefa_nome),
        csvEsc(Number(l.horas_liquidas || 0).toFixed(2)),
      ].join(';'));
    });
    const blob = new Blob([out.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const deTag = ADMIN_TEMPO_FILTRO.de || 'inicio';
    const ateTag = ADMIN_TEMPO_FILTRO.ate || 'hoje';
    a.href = url;
    a.download = `telier_tempo_${deTag}_${ateTag}.csv`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast('CSV exportado');
  } catch (e) {
    toast(e.message, 'err');
  }
}

function normalizarColaboradoresTarefas(tarefas) {
  return (tarefas || []).map(t => ({
    ...t,
    colaboradores_ids: t.colaboradores_ids_raw
      ? t.colaboradores_ids_raw.split(',').filter(Boolean)
      : [],
    colaboradores_nomes: t.colaboradores_nomes_raw
      ? t.colaboradores_nomes_raw.split('||').filter(Boolean)
      : [],
  }));
}

function tarefaCompartilhadaComigo(t) {
  if (!t || !EU?.id) return false;
  return t.dono_id !== EU.id && (t.colaboradores_ids || []).includes(EU.id);
}

function filtrarColecaoTarefas(tarefas, opts = {}) {
  let lista = [...(tarefas || [])];
  const origem = opts.origem ?? FILTRO_ORIGEM_TAREFAS;
  const busca = typeof opts.busca === 'string' ? opts.busca : BUSCA_TAREFA;
  const responsavel = opts.responsavel ?? FILTRO_RESP_TAR;
  const status = opts.status ?? FILTRO_STATUS_TAREFA;

  if (origem === 'meus') lista = lista.filter(t => t.dono_id === EU?.id);
  else if (origem === 'compartilhadas') lista = lista.filter(t => tarefaCompartilhadaComigo(t));
  if (responsavel) lista = lista.filter(t => t.dono_id === responsavel);
  if (status && status !== 'todos') lista = lista.filter(t => t.status === status);
  if (busca) lista = lista.filter(t => (t.nome || '').toLowerCase().includes(busca.toLowerCase()));
  return lista;
}

function renderAoVivoStream(sessoes, opts = {}) {
  const mostrarProjeto = !!opts.mostrarProjeto;
  const abrir = typeof opts.abrir === 'function' ? opts.abrir : null;
  const titulo = opts.titulo || 'Ao vivo';
  const copy = opts.copy || 'Sessões ativas neste momento.';
  const resumo = `${sessoes.length} sess${sessoes.length === 1 ? 'ão ativa' : 'ões ativas'}`;
  return `
    <div class="task-view-surface">
      <div class="task-view-head">
        <div>
          <div class="task-view-eyebrow">${titulo}</div>
          <div class="task-view-title">${resumo}</div>
          <div class="task-view-copy">${copy}</div>
        </div>
        <div class="task-view-kpi">Atualiza ao recarregar a aba</div>
      </div>
      <div class="task-live-list">
        ${sessoes.map(s => {
          const seg = s.inicio
            ? Math.max(0, Math.floor((Date.now() - new Date(s.inicio.replace(' ','T')+'Z').getTime()) / 1000))
            : 0;
          const onclick = abrir ? `onclick="${abrir(s)}"` : '';
          const clickable = abrir ? ' clickable' : '';
          return `
            <div class="task-live-item${clickable}" ${onclick}>
              <div class="task-live-dot"></div>
              <div class="task-live-main">
                <div class="task-live-title">${esc(s.tarefa_nome)}</div>
                <div class="task-live-sub">
                  ${mostrarProjeto ? `${esc(s.projeto_nome)} · ` : ''}${esc(s.usuario_nome)} · iniciado ${fmtDuracao(seg)} atr&aacute;s
                </div>
              </div>
              <div class="task-live-aside">
                <div class="resp-chip">${avatar(s.usuario_nome,'avatar-sm')} <span>${esc(s.usuario_nome)}</span></div>
                <div class="task-live-time">${fmtDuracao(seg)}</div>
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

    c.style.opacity = '';
    c.style.pointerEvents = '';
    c.innerHTML = `<div class="error-block">${esc(e.message)}</div>`;
  }
}

function mudarAbaGrupo(aba) {
  document.querySelectorAll('.aba').forEach(b => b.classList.toggle('ativa', b.dataset.aba === aba));
  if (GRUPO_ATUAL?.id) sessionStorage.setItem(`telier_grupo_aba_${GRUPO_ATUAL.id}`, aba);
  const projetos = GRUPO_ATUAL?._projetos || [];
  renderAbaGrupo(aba, projetos);
}

function renderAbaGrupo(aba, projetos) {
  const el = document.getElementById('aba-grupo');
  if (!el) return;
  if (aba === 'projetos') renderGrupoAbaProjetos(el, projetos);
  else if (aba === 'tarefas') renderGrupoAbaTarefas(el);
  else if (aba === 'mapa') renderGrupoAbaMapa(el);
  else if (aba === 'aovivo') renderGrupoAbaAoVivo(el);
  else if (aba === 'relatorio') renderGrupoAbaRelatorio(el, projetos);
}

async function carregarTarefasGrupo(grupo = GRUPO_ATUAL) {
  if (!grupo) return [];
  const projetos = grupo._projetos || [];
  const cacheKey = projetos.map(p => p.id).join('|');
  if (grupo._tarefasCacheKey === cacheKey && Array.isArray(grupo._tarefasCache)) return grupo._tarefasCache;
  const listas = await Promise.all(projetos.map(p =>
    req('GET', `/projetos/${p.id}/tarefas`).catch(() => []).then(tarefas =>
      normalizarColaboradoresTarefas(tarefas).map(t => ({
        ...t,
        projeto_id: t.projeto_id || p.id,
        projeto_nome: t.projeto_nome || p.nome,
        grupo_id: grupo.id,
        grupo_nome: grupo.nome,
      }))
    )
  ));
  const tarefas = listas.flat();
  grupo._tarefasCacheKey = cacheKey;
  grupo._tarefasCache = tarefas;
  return tarefas;
}

async function carregarAoVivoGrupo(grupo = GRUPO_ATUAL) {
  if (!grupo) return [];
  const projetos = grupo._projetos || [];
  const ids = new Set(projetos.map(p => String(p.id)));
  const ativas = await req('GET', '/tempo/ativas').catch(() => []);
  return (ativas || []).filter(s => ids.has(String(s.projeto_id)));
}

async function carregarAoVivoProjeto(projetoId) {
  if (!projetoId) return [];
  const ativas = await req('GET', '/tempo/ativas').catch(() => []);
  return (ativas || []).filter(s => String(s.projeto_id) === String(projetoId));
}

    return;
  }
  el.innerHTML = `<div class="cards-grid">${renderCardsDash(projetos)}</div>`;
}

    let filtroStatus = 'todos';

      else if (filtroOrigem === 'compartilhadas') lista = lista.filter(t => tarefaCompartilhadaComigo(t));
      if (filtroStatus !== 'todos') lista = lista.filter(t => t.status === filtroStatus);
      if (filtroPrior !== 'todos') lista = lista.filter(t => t.prioridade === filtroPrior);
      if (filtroResp) lista = lista.filter(t => t.dono_id === filtroResp);
      if (filtroProjeto) lista = lista.filter(t => String(t.projeto_id) === String(filtroProjeto));
      if (filtroBusca) lista = lista.filter(t => (t.nome || '').toLowerCase().includes(filtroBusca.toLowerCase()));
      const tbody = document.getElementById('gt-tbody');
      if (!tbody) return;
      tbody.innerHTML = lista.length ? lista.map(t => `
        <tr onclick="abrirProjeto('${t.projeto_id}')" class="clickable-row">
          <td><span class="tag tag-gray">${esc(t.projeto_nome || '—')}</span></td>

          <td>${tag(t.prioridade, PT[t.prioridade])}</td>
          <td>${tag(t.status)}</td>
          <td><span class="mono mono-cell-muted">${t.data ? prazoFmt(t.data,true) : '—'}</span></td>
        </tr>`).join('')
      : `<tr><td colspan="6" class="table-empty-row">Nenhuma tarefa encontrada.</td></tr>`;
    }

    window._gtAplicar = () => aplicar();
    const statusTabs = ['todos','A fazer','Em andamento','Bloqueada','Concluída'];

    el.innerHTML = `
      <div class="dash-toolbar task-view-toolbar tarefas-toolbar-spaced">
        <div class="dash-toolbar-row">
          <div class="task-toolbar-main">
            <input type="search" class="search-dash search-tarefa" placeholder="Buscar tarefa..." oninput="window._gtBusca=this.value;window._gtAplicar()">
            <div class="segmented">
              <button class="segmented-btn ativo" id="gt-origem-todos" onclick="window._gtFiltroOrigem='todos';window._gtAplicar();document.getElementById('gt-origem-todos').classList.add('ativo');document.getElementById('gt-origem-meus').classList.remove('ativo');document.getElementById('gt-origem-comp').classList.remove('ativo')">Todas${tarefas.length ? `<span class="seg-count">${tarefas.length}</span>` : ''}</button>
              <button class="segmented-btn" id="gt-origem-meus" onclick="window._gtFiltroOrigem='meus';window._gtAplicar();document.getElementById('gt-origem-meus').classList.add('ativo');document.getElementById('gt-origem-todos').classList.remove('ativo');document.getElementById('gt-origem-comp').classList.remove('ativo')">Minhas${minhas ? `<span class="seg-count">${minhas}</span>` : ''}</button>
              <button class="segmented-btn" id="gt-origem-comp" onclick="window._gtFiltroOrigem='compartilhadas';window._gtAplicar();document.getElementById('gt-origem-comp').classList.add('ativo');document.getElementById('gt-origem-todos').classList.remove('ativo');document.getElementById('gt-origem-meus').classList.remove('ativo')">Compartilhadas${compartilhadas ? `<span class="seg-count">${compartilhadas}</span>` : ''}</button>
            </div>
          </div>
          <div class="task-toolbar-actions">
            <button class="btn btn-sm task-mobile-filter-btn" onclick="window._gtFiltersOpen=!window._gtFiltersOpen;window._gtAplicar()">Filtros</button>
            <div class="task-view-kpi">${tarefas.length} tarefa${tarefas.length!==1?'s':''}</div>
          </div>
        </div>
        <div class="dash-toolbar-row task-mobile-secondary ${window._gtFiltersOpen ? 'is-open' : ''}">
          <div class="task-toolbar-summary">
            ${projetosFiltro.length > 1 ? `<select class="select-control" onchange="window._gtFiltroProjeto=this.value;window._gtAplicar()">
              <option value="">Todos os projetos</option>
              ${projetosFiltro.map(p=>`<option value="${p.id}">${esc(p.nome)}</option>`).join('')}
            </select>` : ""}
            ${responsaveis.length > 1 ? `<select class="select-control" onchange="window._gtFiltroResp=this.value;window._gtAplicar()">
              <option value="">Todos os responsáveis</option>
              ${responsaveis.map(r=>`<option value="${r.id}">${esc(r.nome)}</option>`).join('')}
            </select>` : ''}
            <select class="select-control" onchange="window._gtFiltroPrior=this.value;window._gtAplicar()">
              <option value="todos">Toda prioridade</option>

            ${statusTabs.map(s => `<button class="filter-btn ${s==='todos'?'ativo':''}" id="gt-status-${s.replace(/\s+/g,'-')}" onclick="window._gtFiltroStatus='${esc(s)}';window._gtAplicar();document.querySelectorAll('[id^=\\'gt-status-\\']').forEach(el=>el.classList.remove('ativo'));document.getElementById('gt-status-${s.replace(/\s+/g,'-')}').classList.add('ativo')">${s==='todos'?'Todos':s}</button>`).join('')}

        </div>
      </div>
      <div class="task-view-surface">
      <div class="task-table-shell">
      <div class="table-scroll">
        <table class="tasks-table tasks-table-full">

          <tbody id="gt-tbody"></tbody>
        </table>
      </div>
      </div>

    window._gtFiltroProjeto = '';
    window._gtFiltroStatus = 'todos';
    window._gtFiltroPrior = 'todos';
    window._gtFiltroResp = '';
    window._gtFiltroOrigem = 'todos';
    window._gtBusca = '';
    window._gtFiltersOpen = false;
    aplicar();
  } catch (e) { el.innerHTML = `<div class="error-block">${esc(e.message)}</div>`; }

async function renderGrupoAbaMapa(el) {
  if (!GRUPO_ATUAL?.id) return;
  el.innerHTML = `<div class="loading"><div class="spinner"></div> Carregando mapa...</div>`;
  try {
    const tarefas = await carregarTarefasGrupo();
    const pendentes = tarefas
      .filter(t => t.status !== 'Concluída' && t.status !== 'Bloqueada')
      .sort((a, b) => {
        const p = (PO[a.prioridade] ?? 1) - (PO[b.prioridade] ?? 1);
        if (p) return p;
        const d = (DO[a.complexidade] ?? 1) - (DO[b.complexidade] ?? 1);
        if (d) return d;
        const da = a.data || '9999-99-99';
        const db = b.data || '9999-99-99';
        return da.localeCompare(db);
      });

    if (!pendentes.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-text">Todas as tarefas concluídas</div></div>`;
      return;
    }

    const bloqueadas = tarefas.filter(t => t.status === 'Bloqueada');
    el.innerHTML = `
      <div class="task-view-surface">
        <div class="task-view-head">
          <div>
            <div class="task-view-eyebrow">Mapa de foco do grupo</div>
            <div class="task-view-title">${pendentes.length} prioridade${pendentes.length !== 1 ? 's' : ''} entre projetos</div>
            <div class="task-view-copy">Ordenado por prioridade, complexidade e prazo entre todos os projetos do grupo.</div>
          </div>
          <div class="task-view-kpi">${bloqueadas.length} bloqueada${bloqueadas.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="mapa-intro">Clique em um item para abrir o projeto e continuar a execução dali.</div>
        ${bloqueadas.length ? `
          <div class="task-view-surface" style="padding:12px 14px;background:rgba(231,68,68,.06);border-color:rgba(231,68,68,.2);box-shadow:none">
            <div class="task-view-eyebrow" style="color:var(--red)">Bloqueadas</div>
            <div class="task-status-strip">
              ${bloqueadas.map(t => `<span class="tag tag-red">${esc(t.nome)}</span>`).join('')}
            </div>
          </div>` : ''}
        <div class="mapa-list">
          ${pendentes.map((t, i) => {
            const diasT = diasRestantes(t.data || null);
            const urgt = diasT !== null && diasT <= 2 && t.status !== 'Concluída';
            return `
              <div class="mapa-item clickable ${t.foco && t.dono_id === EU?.id ? 'is-foco' : ''}"
                   onclick="abrirProjeto('${t.projeto_id}')">
                <div class="mapa-rank">${String(i + 1).padStart(2, '0')}</div>
                <div class="mapa-body">
                  <div class="mapa-nome">${esc(t.nome)}</div>
                  <div class="mapa-sub">${esc(t.projeto_nome || '')} · ${esc(t.dono_nome || 'Sem responsável')}</div>
                </div>
                <div class="mapa-tags">
                  ${tag(t.prioridade, PT[t.prioridade])}
                  ${tag(t.complexidade || t.dificuldade, DT[t.complexidade || t.dificuldade])}
                  ${t.foco && t.dono_id === EU?.id ? '<span class="tag tag-purple">Meu foco</span>' : ''}
                  ${urgt ? `<span class="tag ${diasT <= 0 ? 'tag-red' : 'tag-yellow'} mono">${diasT <= 0 ? 'vencida' : diasT + 'd'}</span>` : ''}
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  } catch (e) { el.innerHTML = `<div class="error-block">${esc(e.message)}</div>`; }
}

async function renderGrupoAbaAoVivo(el) {

function renderGrupoAbaRelatorio(el, projetos) {
  if (!projetos.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-text">Nenhum projeto no grupo</div></div>`;

  const total      = projetos.length;

  const arquivados = projetos.filter(p => normalizarStatusProjeto(p.status) === 'Arquivado').length;
  const totalHoras = projetos.reduce((s, p) => s + (parseFloat(p.total_horas) || 0), 0);
  const totalArea  = projetos.reduce((s, p) => s + (parseFloat(p.area_m2)    || 0), 0);
  const hoje       = new Date().toISOString().slice(0, 10);
  const atrasados  = projetos.filter(p =>
    p.prazo && p.prazo < hoje &&
    !['Concluído','Arquivado'].includes(normalizarStatusProjeto(p.status))
  ).length;

  el.innerHTML = `
    <div class="task-view-surface">
    <div class="task-view-head">
      <div>
        <div class="task-view-eyebrow">Relatório do grupo</div>
        <div class="task-view-title">${total} projeto${total !== 1 ? 's' : ''}</div>
        <div class="task-view-copy">Resumo consolidado do grupo.</div>
      </div>
      <div class="task-view-kpi">${fmtHoras(totalHoras)}</div>

        ['Horas totais', fmtHoras(totalHoras),         false],
        ['Área total',  totalArea ? `${totalArea.toLocaleString('pt-BR')} m²` : '—', false],
        ['Atrasados',   atrasados || '0',              atrasados > 0],
      ].map(([label, val, alerta]) => `
