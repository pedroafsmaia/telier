name: Deploy Telier Platform

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'frontend-v2/**'
      - 'package.json'
      - 'smoke-rebuild.js'
      - 'src/worker.js'
      - 'wrangler.toml'
      - 'db/schema.sql'

jobs:
  validate-rebuild:
    runs-on: ubuntu-latest
    name: Validate frontend-v2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend-v2 dependencies
        run: npm ci
        working-directory: frontend-v2

      - name: Lint frontend-v2
        run: npm run lint
        working-directory: frontend-v2

      - name: Build frontend-v2
        run: npm run build
        working-directory: frontend-v2

      - name: Upload frontend-v2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-v2-dist
          path: frontend-v2/dist

      - name: Smoke frontend-v2 locally
        run: npm run smoke:rebuild

  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker and Pages
    needs: validate-rebuild
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend-v2 dependencies
        run: npm ci
        working-directory: frontend-v2

      - name: Build frontend-v2 for Pages
        run: npm run build
        working-directory: frontend-v2
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy Worker via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy Pages via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy frontend-v2/dist --project-name telier