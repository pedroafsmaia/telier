# wrangler.toml — configuração do Cloudflare Worker
# Substitua os valores SEU_* pelos seus dados reais

name = "telier-api"
main = "src/worker.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "telier-db"
database_id = "SEU_DATABASE_ID_AQUI"

[vars]
ALLOWED_ORIGIN = "https://telier.pages.dev"
